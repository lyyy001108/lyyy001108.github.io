<h2>📖 第一章：数据清洗实战</h2>
<p>数据清洗是数据分析的第一步，也是最耗时的环节（通常占整个分析过程的60-80%）。本课程将系统讲解Pandas数据清洗的核心技术。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>掌握处理缺失值的多种方法（删除、填充、插值）</li>
<li>掌握重复值的检测与删除</li>
<li>掌握异常值的识别与处理</li>
<li>掌握数据类型转换与格式统一</li>
</ul>

<h3>📌 什么是数据清洗？</h3>
<p>数据清洗（Data Cleaning）是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。现实数据往往存在以下问题：</p>
<ul>
<li><strong>不完整</strong>：缺少属性值或某些字段为空</li>
<li><strong>有噪声</strong>：包含错误值或异常值</li>
<li><strong>不一致</strong>：命名或代码不统一</li>
<li><strong>重复</strong>：存在完全相同的记录</li>
</ul>

<h3>🔧 为什么需要数据清洗？</h3>
<ul>
<li><strong>提高数据质量</strong>：错误数据会导致错误的分析结论</li>
<li><strong>保证分析准确性</strong>：清洗后的数据才能反映真实情况</li>
<li><strong>提升模型性能</strong>：机器学习模型对数据质量非常敏感</li>
<li><strong>避免"垃圾进垃圾出"</strong>：输入质量决定输出质量</li>
</ul>

<h3>📖 9步完整数据清洗流程</h3>
<table>
<tr><th>步骤</th><th>操作</th><th>Pandas方法</th></tr>
<tr><td>1</td><td>处理重复值</td><td>drop_duplicates(), duplicated()</td></tr>
<tr><td>2</td><td>处理缺失值</td><td>isnull(), fillna(), dropna()</td></tr>
<tr><td>3</td><td>处理异常值</td><td>描述统计+业务规则筛选</td></tr>
<tr><td>4</td><td>格式统一</td><td>str.lower(), str.strip()</td></tr>
<tr><td>5</td><td>数据类型转换</td><td>astype(), to_datetime()</td></tr>
<tr><td>6</td><td>列名标准化</td><td>rename()</td></tr>
<tr><td>7</td><td>值映射</td><td>map(), replace()</td></tr>
<tr><td>8</td><td>数据验证</td><td>条件筛选</td></tr>
<tr><td>9</td><td>记录清洗过程</td><td>日志记录</td></tr>
</table>

<h3>💡 缺失值处理方法详解</h3>
<ul>
<li><strong>删除法</strong>：dropna()删除包含缺失的行或列，适合缺失比例很小的情况</li>
<li><strong>填充法</strong>：fillna()用指定值填充，常用中位数、均值、众数</li>
<li><strong>插值法</strong>：interpolate()用前后值线性插值，适合时间序列</li>
<li><strong>前向/后向填充</strong>：method='ffill'/'bfill'用前面或后面的值填充</li>
</ul>

<h3>💡 异常值检测方法</h3>
<ul>
<li><strong>3σ原则</strong>：假设数据服从正态分布，超出均值±3倍标准差的值视为异常</li>
<li><strong>IQR法</strong>：四分位距法，超出Q1-1.5IQR或Q3+1.5IQR的值视为异常</li>
<li><strong>业务规则法</strong>：根据业务常识设定合理范围</li>
</ul>

<h3>⚠️ 注意事项</h3>
<p>不要过度清洗！删除太多数据可能会丢失重要信息。清洗前先备份原始数据，每次操作后检查数据量变化。建议使用Jupyter Notebook分段执行，便于调试和记录。</p>`,

          learn:`
<h2>📊 第二章：多维统计分析</h2>
<p>描述性统计是数据分析的基础，通过计算均值、中位数、标准差等指标快速了解数据分布特征。本课程将系统学习统计分析方法。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>掌握描述性统计指标的计算与解读</li>
<li>掌握分组聚合分析方法</li>
<li>掌握相关性分析的原理与应用</li>
<li>理解数据分布特征（偏度、峰度）</li>
</ul>

<h3>📊 描述性统计指标详解</h3>
<table>
<tr><th>指标</th><th>含义</th><th>计算公式</th><th>特点</th></tr>
<tr><td>均值</td><td>算术平均数</td><td>μ = Σx/n</td><td>对异常值敏感</td></tr>
<tr><td>中位数</td><td>排序后中间值</td><td>50%分位数</td><td>不受异常值影响</td></tr>
<tr><td>众数</td><td>出现频率最高的值</td><td>频率统计</td><td>适合分类数据</td></tr>
<tr><td>方差</td><td>离散程度</td><td>σ² = Σ(x-μ)²/n</td><td>衡量波动性</td></tr>
<tr><td>标准差</td><td>方差的平方根</td><td>σ = √σ²</td><td>与原数据同单位</td></tr>
<tr><td>偏度</td><td>分布对称性</td><td>Skewness</td><td>正偏/负偏/对称</td></tr>
<tr><td>峰度</td><td>分布陡峭程度</td><td>Kurtosis</td><td>尖峰/平峰/正态</td></tr>
</table>

<h3>📈 相关性分析</h3>
<p>相关系数r衡量两个变量间的线性关系强度，取值范围-1到1：</p>
<ul>
<li><strong>r = 1</strong>：完全正相关，一个增大另一个也按比例增大</li>
<li><strong>r = -1</strong>：完全负相关，一个增大另一个按比例减小</li>
<li><strong>r = 0</strong>：无线性关系</li>
<li><strong>|r| > 0.8</strong>：强相关</li>
<li><strong>0.3 < |r| < 0.8</strong>：中等相关</li>
<li><strong>|r| < 0.3</strong>：弱相关</li>
</ul>
<p>⚠️ 注意：相关不等于因果！需要结合业务逻辑判断。</p>

<h3>📖 分组聚合分析</h3>
<p>分组聚合是将数据按某个维度分组后计算统计量，类似SQL的GROUP BY。常用聚合函数：</p>
<ul>
<li>sum()：求和</li>
<li>mean()：平均值</li>
<li>median()：中位数</li>
<li>count()：计数</li>
<li>max() / min()：最大值/最小值</li>
<li>std() / var()：标准差/方差</li>
<li>agg()：同时应用多个聚合函数</li>
</ul>

<h3>💡 实战案例：销售数据分析</h3>
<p>某电商公司想要了解：不同产品的销售情况、销售额与销量的关系、各地区的业绩表现。通过描述性统计可以快速回答这些问题。</p>`,

import numpy as np

# 创建销售数据

    '地区': np.random.choice(['东区','西区','南区','北区'], n),
    '销售额': np.random.normal(500, 150, n).astype(int),
    '销量': np.random.poisson(30, n),

<h2>🛒 第三章：购物车关联规则</h2>
<p>关联规则挖掘用于发现商品之间的购买关联，是零售业数据挖掘的经典应用。著名的"啤酒与尿布"案例就是关联规则的典型应用。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>理解支持度、置信度、提升度的含义</li>
<li>掌握Apriori算法的原理</li>
<li>能够使用mlxtend库进行关联规则挖掘</li>
<li>能够解读关联规则结果并提出业务建议</li>
</ul>

<h3>📖 核心概念</h3>
<ul>
<li><strong>支持度(Support)</strong>：包含商品X的交易占总交易的比例。公式：Support(X) = count(X)/总交易数。支持度越高说明商品越热门。</li>
<li><strong>置信度(Confidence)</strong>：购买X的顾客同时购买Y的概率。公式：Confidence(X→Y) = Support(X∪Y)/Support(X)。置信度越高说明关联越强。</li>
<li><strong>提升度(Lift)</strong>：购买X对购买Y的提升作用。公式：Lift(X→Y) = Confidence(X→Y)/Support(Y)。</li>
</ul>
<p>提升度的解读：</p>
<ul>
<li>Lift > 1：正相关，购买X会促进购买Y</li>
<li>Lift < 1：负相关，购买X会抑制购买Y</li>
<li>Lift = 1：独立，X和Y无关联</li>
</ul>

<h3>📈 Apriori算法原理</h3>
<p>Apriori算法基于"先验性质"：一个项集是频繁的，则它的所有子集也是频繁的。算法步骤：</p>
<ol>
<li>设置最小支持度阈值，扫描数据集找出所有频繁1项集</li>
<li>根据频繁k项集生成候选(k+1)项集（连接步）</li>
<li>计算候选集的支持度，筛选出频繁(k+1)项集（剪枝步）</li>
<li>重复2-3步直到无法生成新的频繁项集</li>
<li>根据最小置信度从频繁项集生成关联规则</li>
</ol>

<h3>💡 业务应用场景</h3>
<ul>
<li><strong>商品推荐</strong>：购买了A的用户也常买B，可以捆绑推荐</li>
<li><strong>货架摆放</strong>：关联强的商品放在附近，提高交叉销售</li>
<li><strong>促销策略</strong>：对提升度高的商品组合进行联合促销</li>
<li><strong>套餐设计</strong>：组合高频购买的商品形成套餐</li>
<li><strong>购物篮分析</strong>：了解顾客购买习惯，优化商品结构</li>
</ul>

<h3>⚠️ 注意事项</h3>
<p>最小支持度和置信度的设置需要根据业务调整；关联规则数量可能很多，需要按提升度排序筛选；注意区分相关关系和因果关系。</p>`,

<h2>🔍 第四章：KMeans聚类分析</h2>
<p>KMeans是经典的无监督学习算法，用于将相似的数据点分组。广泛应用于客户分群、商品分类、图像分割等场景。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>理解KMeans算法的原理和步骤</li>
<li>掌握肘部法则选择K值</li>
<li>学会数据标准化处理</li>
<li>能够解读聚类结果并提出业务建议</li>
</ul>

<h3>📖 算法原理</h3>
<p>KMeans算法将数据分为K个簇，簇内点距离近，簇间点距离远。算法步骤：</p>
<ol>
<li>随机选择K个点作为初始质心</li>
<li>计算每个点到各质心的距离，分配到最近的簇</li>
<li>重新计算每个簇的质心（簇内点的均值）</li>
<li>重复2-3步直到质心不再变化或达到迭代次数</li>
</ol>
<p>距离通常使用欧氏距离：d = √[(x₁-y₁)² + (x₂-y₂)² + ...]</p>

<h3>📊 如何选择K值</h3>
<ul>
<li><strong>肘部法则</strong>：计算不同K值的SSE（簇内平方和），选择SSE下降趋缓的拐点</li>
<li><strong>轮廓系数</strong>：评估聚类效果，值在-1到1之间，越大越好</li>
<li><strong>业务经验</strong>：根据实际业务场景确定分组数</li>
</ul>

<h3>💡 应用场景</h3>
<ul>
<li><strong>客户分群</strong>：根据消费行为将客户分组，针对性运营</li>
<li><strong>商品分类</strong>：将相似商品聚类，优化货架管理</li>
<li><strong>异常检测</strong>：距离所有簇中心都远的点可能是异常</li>
<li><strong>图像压缩</strong>：将相似颜色聚类，减少颜色数</li>
<li><strong>文本聚类</strong>：将相似文档分组</li>
</ul>

<h3>⚠️ 注意事项</h3>
<ul>
<li>KMeans对初始质心敏感，建议多次运行取最佳结果</li>
<li>需要标准化数据消除量纲影响</li>
<li>假设簇是球形且大小相近，不符合时效果不佳</li>
<li>不适合处理非球形簇或密度不均匀的数据</li>
<li>需要预先指定K值</li>
</ul>`,

<h2>👥 第五章：RFM模型用户分层</h2>
<p>RFM模型是经典的客户价值分析模型，通过最近消费时间、消费频率、消费金额三个维度对客户进行分层，是CRM系统的核心工具。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>理解RFM各维度的含义</li>
<li>掌握RFM评分方法</li>
<li>能够根据RFM得分进行客户分层</li>
<li>能为不同层级客户制定运营策略</li>
</ul>

<h3>📖 RFM指标详解</h3>
<ul>
<li><strong>R（Recency - 最近消费时间）</strong>：客户最近一次消费距离今天的天数。R越小越好，说明客户活跃度高，近期有互动。</li>
<li><strong>F（Frequency - 消费频率）</strong>：一定时期内客户消费的次数。F越大越好，说明客户忠诚度高，重复购买意愿强。</li>
<li><strong>M（Monetary - 消费金额）</strong>：一定时期内客户消费的总金额。M越大越好，说明客户价值高，贡献度高。</li>
</ul>

<h3>📊 RFM评分方法</h3>

          code: `import pandas as pd
import numpy as np
from datetime import datetime, timedelta

# 创建客户数据

n = 50
today = datetime.now()

}
df = pd.DataFrame(data)

# 计算R值
df['R'] = (today - df['最后消费日期']).dt.days

# RFM评分

df['F_score'] = pd.qcut(df['消费次数'].rank(method='first'), 5, labels=[1,2,3,4,5]).astype(int)
df['M_score'] = pd.qcut(df['累计金额'], 5, labels=[1,2,3,4,5]).astype(int)

print("\\n" + "="*60)
print("【RFM评分】")
print(df[['客户ID', 'R', 'R_score', '消费次数', 'F_score', '累计金额', 'M_score']].head(10))

# 客户分层函数
def get_segment(row):
    r, f, m = row['R_score'], row['F_score'], row['M_score']
    if r >= 4 and f >= 4 and m >= 4:
        return '👑 重要价值客户'
    elif r >= 4 and m >= 4:

        { id:6, name:"线性回归分析", duration:"45分钟", level:"进阶",
          learn:`
<h2>📈 第六章：线性回归分析</h2>
<p>线性回归是预测连续变量的基础模型，广泛应用于销售预测、价格预测、趋势分析等场景。本课程将系统学习线性回归的原理和应用。</p>

<h3>🎯 学习目标</h3>
<ul>
<li>理解线性回归的数学原理</li>
<li>掌握最小二乘法估计参数</li>
<li>学会评估回归模型性能</li>
<li>能够解读回归系数</li>
</ul>

<h3>📖 模型原理</h3>
<p>线性回归假设目标变量y与特征x存在线性关系：y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε</p>
<ul>
<li>β₀：截距，当所有特征为0时的预测值</li>
<li>βᵢ：回归系数，特征每增加1单位对y的影响</li>
<li>ε：误差项，实际值与预测值的差异</li>
</ul>

<h3>📊 参数估计</h3>
<p>使用最小二乘法（OLS）估计参数，目标是最小化残差平方和：RSS = Σ(yᵢ - ŷᵢ)²。求解公式：β = (XᵀX)⁻¹Xᵀy</p>

<h3>📉 模型评估指标</h3>
<ul>
<li><strong>R²（决定系数）</strong>：模型解释的变异比例，范围[0,1]，越接近1越好</li>
<li><strong>调整R²</strong>：考虑特征数量的R²，防止过拟合</li>
<li><strong>MSE（均方误差）</strong>：预测误差平方的平均值，越小越好</li>
<li><strong>RMSE（均方根误差）</strong>：MSE的平方根，与原数据单位一致</li>
<li><strong>MAE（平均绝对误差）</strong>：绝对误差的平均值，更稳健</li>
</ul>

<h3>⚠️ 假设条件</h3>
<p>线性回归需要满足以下假设：线性关系、误差独立、误差同方差、误差正态分布、无多重共线性。</p>`,
