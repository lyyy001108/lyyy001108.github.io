<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>李颖 · 商务数据分析实训营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #fef5f0 100%);
            color: #2c4a3a;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e0ecd9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b8cfb0; border-radius: 10px; }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 头部 */
        .hero {
            background: rgba(255, 252, 245, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(160, 190, 140, 0.35);
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #448A62, #C2857B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .hero .school {
            font-size: 0.9rem;
            color: #789D82;
            margin: 0.5rem 0;
        }

        .hero .bio {
            max-width: 80%;
            margin: 0.5rem auto 0;
            font-size: 0.85rem;
            color: #7FA182;
            background: rgba(250, 245, 240, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
        }

        /* 统计卡片 */
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin: 1.5rem 0 2rem;
            justify-content: center;
        }

        .stat-card {
            background: rgba(255, 252, 245, 0.8);
            backdrop-filter: blur(4px);
            flex: 1;
            min-width: 100px;
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(180, 210, 150, 0.4);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #6B9A78, #C28A7A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #AD8A7A;
        }

        /* 课程网格 */
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            margin: 1.5rem 0 1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 650;
            color: #568469;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .course-card {
            background: rgba(255, 255, 250, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            transition: all 0.3s ease;
            border: 1px solid #e8e0d4;
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-5px);
            background: white;
            border-color: #E6C8BC;
            box-shadow: 0 15px 25px rgba(100, 70, 60, 0.08);
        }

        .card-icon { font-size: 2rem; margin-bottom: 0.3rem; }
        .course-name { font-size: 1.2rem; font-weight: 700; color: #568469; margin: 0.2rem 0; }
        .course-desc { font-size: 0.75rem; color: #8DA38E; margin-bottom: 0.5rem; }
        .course-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .tag { background: #FCE9E0; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.65rem; color: #C2847A; }

        /* 按钮 */
        .back-btn {
            background: #d4c0b0;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        /* 课程详情页布局 */
        .detail-layout {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1;
            min-width: 220px;
            background: rgba(255, 252, 245, 0.8);
            border-radius: 1.5rem;
            padding: 1.2rem;
            position: sticky;
            top: 1rem;
            height: fit-content;
        }

        .sidebar h3 { color: #568469; margin-bottom: 1rem; font-size: 1rem; }
        .toc-list { list-style: none; }
        .toc-list li {
            margin: 0.6rem 0;
            padding: 0.4rem 0.6rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #8ba18e;
            transition: 0.2s;
        }
        .toc-list li:hover { background: #fceae3; color: #c28a7a; }
        .toc-list li.active { background: #dbbcac; color: white; }

        .main-content {
            flex: 2.5;
            min-width: 300px;
        }

        /* 内容卡片 */
        .content-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .content-card h3 { color: #568469; margin-bottom: 0.6rem; font-size: 1.2rem; }
        .content-card p { color: #5a7a62; line-height: 1.5; font-size: 0.9rem; }

        .code-block {
            background: #f0f0e8;
            padding: 0.8rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            margin: 0.8rem 0;
            position: relative;
        }
        .copy-btn {
            background: #dbbcac;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            float: right;
        }

        /* 测验区域 */
        .quiz-card {
            background: #fefaf5;
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-top: 0.5rem;
            border: 1px solid #f0dfd6;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }
        .timer {
            background: #fceae3;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            color: #c28a7a;
        }
        .question-item {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .options { display: flex; flex-direction: column; gap: 0.5rem; margin: 0.6rem 0; }
        .option {
            background: #fef5f0;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .option:hover { background: #ffede3; }
        .option.selected { background: #dbbcac; color: white; }
        .quiz-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
        .quiz-actions button {
            background: #dbbcac;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .quiz-result { background: #e0f0e4; padding: 0.8rem; border-radius: 1rem; text-align: center; }

        /* 底部 */
        .contact {
            background: rgba(255, 250, 240, 0.7);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }
        .contact-links { display: flex; gap: 1.2rem; }
        .contact-links a { color: #9b8a7a; text-decoration: none; font-size: 0.85rem; }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #b1a99a; }

        .hide { display: none; }
        @media (max-width: 760px) {
            .container { padding: 1rem; }
            .detail-layout { flex-direction: column; }
            .sidebar { position: static; }
        }
    </style>
</head>

        quizState[courseId].timerInterval = setInterval(() => {

                quizState[courseId].timeLeft--;
