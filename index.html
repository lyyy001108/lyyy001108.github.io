<body>
<div id="app"></div>

<script>
    // ==================== 10个项目完整数据 ====================
    const projects = [
        { id:1, name:"数据清洗实战", duration:"30分钟", level:"入门",
          learn: `
<h2>📖 第一章：数据清洗实战</h2>
<p>数据清洗是数据分析的第一步，也是最耗时的环节（通常占整个分析过程的60-80%）。</p>
<h3>🎯 学习目标</h3>
<ul><li>掌握处理缺失值的多种方法</li><li>掌握重复值的检测与删除</li><li>掌握异常值的识别与处理</li></ul>
<h3>📌 什么是数据清洗？</h3>
<p>数据清洗是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。</p>
<h3>🔧 为什么需要数据清洗？</h3>
<ul><li>提高数据质量</li><li>保证分析准确性</li><li>提升模型性能</li></ul>
<h3>📖 9步完整数据清洗流程</h3>
<ol><li>处理重复值 - drop_duplicates()</li><li>处理缺失值 - fillna() / dropna()</li><li>处理异常值 - 业务规则筛选</li><li>格式统一 - str.strip()</li><li>数据类型转换 - astype()</li><li>列名标准化 - rename()</li><li>值映射 - map() / replace()</li><li>数据验证 - 条件筛选</li><li>记录清洗过程</li></ol>`,
          code: `// 数据清洗示例代码
const data = [
    { name: '张三', age: 25, salary: 5000 },
    { name: '李四', age: null, salary: 6000 },
    { name: '王五', age: 30, salary: 5500 },
    { name: '张三', age: 25, salary: 5000 },
    { name: null, age: 22, salary: 4800 }
];

console.log("原始数据:", data);
console.log("数据条数:", data.length);

// 1. 去重（根据name和age）
const uniqueData = [];
const seen = new Set();
for (let item of data) {
    const key = item.name + '|' + item.age;
    if (!seen.has(key) && item.name !== null) {
        seen.add(key);
        uniqueData.push(item);
    }
}
console.log("去重后:", uniqueData);

// 2. 处理缺失值（年龄用中位数填充）
const ages = uniqueData.filter(d => d.age !== null).map(d => d.age);
ages.sort((a,b) => a-b);
const medianAge = ages[Math.floor(ages.length/2)];
console.log("年龄中位数:", medianAge);

for (let item of uniqueData) {
    if (item.age === null) item.age = medianAge;
}
console.log("填充后:", uniqueData);`,
          explanation: "1. 创建包含重复和缺失的测试数据；2. 使用Set去重；3. 计算年龄中位数填充缺失值。",
          questions: [
              { text:"数据清洗通常占分析过程的多少比例？", options:["20-30%","40-50%","60-80%"], correct:2, explanation:"数据清洗耗时最多，占60-80%。" },
              { text:"处理缺失值的常用方法有？", options:["删除","填充","以上都是"], correct:2, explanation:"删除和填充都是常用方法。" },
              { text:"drop_duplicates()方法的作用是？", options:["删除重复行","删除缺失行","填充缺失值"], correct:0, explanation:"drop_duplicates()删除重复行。" },
              { text:"处理异常值的常用方法是？", options:["业务规则筛选","随机删除","保留所有"], correct:0, explanation:"根据业务规则筛选合理范围。" },
              { text:"fillna()方法用于？", options:["填充缺失值","删除缺失值","检测缺失值"], correct:0, explanation:"fillna()填充缺失值。" },
              { text:"数据清洗的目的是？", options:["提高数据质量","增加数据量","加快计算"], correct:0, explanation:"主要目的是提高数据质量。" },
              { text:"astype()方法用于？", options:["数据类型转换","删除重复","填充缺失"], correct:0, explanation:"astype()转换数据类型。" },
              { text:"str.strip()方法的作用是？", options:["去除首尾空格","转换为大写","拆分字符串"], correct:0, explanation:"strip()去除字符串首尾空格。" },
              { text:"duplicated()方法返回什么？", options:["布尔序列","数值序列","DataFrame"], correct:0, explanation:"duplicated()返回布尔型Series。" },
              { text:"处理缺失值时，什么情况下适合用删除？", options:["缺失比例很小","缺失比例很大","数据量很小"], correct:0, explanation:"缺失比例小时删除影响不大。" }
          ]},
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门",
          learn: `<h2>📊 第二章：多维统计分析</h2><p>描述性统计是数据分析的基础，通过计算均值、中位数、标准差等指标快速了解数据分布。</p><h3>📊 描述性统计指标</h3><ul><li>均值：平均数</li><li>中位数：中间值</li><li>标准差：离散程度</li><li>四分位数：数据分布</li></ul>`,
          code: `// 统计分析示例
const scores = [85, 92, 78, 88, 95, 76, 89, 91, 84, 87];
console.log("成绩数据:", scores);

// 计算均值
const sum = scores.reduce((a,b) => a + b, 0);
const mean = sum / scores.length;
console.log("均值:", mean.toFixed(2));

// 计算中位数
const sorted = [...scores].sort((a,b) => a - b);
const median = sorted.length % 2 === 0 
    ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2
    : sorted[Math.floor(sorted.length/2)];
console.log("中位数:", median);

// 计算标准差
const variance = scores.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / scores.length;
const stdDev = Math.sqrt(variance);
console.log("标准差:", stdDev.toFixed(2));

// 分组统计
const groups = { '高分组': scores.filter(s => s >= 90), '中分组': scores.filter(s => s >= 75 && s < 90), '低分组': scores.filter(s => s < 75) };
console.log("高分组人数:", groups['高分组'].length, "平均分:", (groups['高分组'].reduce((a,b)=>a+b,0)/groups['高分组'].length || 0).toFixed(1));`,
          explanation: "1. 计算均值、中位数、标准差；2. 分组统计。",
          questions: [
              { text:"受异常值影响最大的指标是？", options:["均值","中位数","众数"], correct:0, explanation:"均值对所有值敏感。" },
              { text:"中位数的特点是？", options:["不受异常值影响","受异常值影响","等于均值"], correct:0, explanation:"中位数对异常值不敏感。" },
              { text:"标准差衡量什么？", options:["离散程度","集中趋势","分布形状"], correct:0, explanation:"标准差表示数据波动大小。" },
              { text:"相关系数范围是？", options:["[-1,1]","[0,1]","(-∞,+∞)"], correct:0, explanation:"相关系数-1到1。" },
              { text:"r=0.9表示什么？", options:["强正相关","强负相关","无相关"], correct:0, explanation:"|r|>0.8为强相关。" },
              { text:"groupby()用于？", options:["分组聚合","排序","筛选"], correct:0, explanation:"groupby()分组聚合。" },
              { text:"describe()返回什么？", options:["统计指标","原始数据","排序结果"], correct:0, explanation:"describe()输出统计指标。" },
              { text:"四分位数Q2代表？", options:["中位数","最小值","最大值"], correct:0, explanation:"Q2就是中位数。" },
              { text:"偏度>0表示？", options:["右偏","左偏","对称"], correct:0, explanation:"正偏表示右尾长。" },
              { text:"以下哪个不是描述性统计？", options:["聚类系数","方差","峰度"], correct:0, explanation:"聚类系数不是描述性统计。" }
          ]},
        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶",
          learn: `<h2>🛒 第三章：购物车关联规则</h2><p>关联规则挖掘用于发现商品之间的购买关联。核心概念：支持度、置信度、提升度。</p>`,
          code: `// 关联规则示例 - 计算商品购买频率
const transactions = [
    ['牛奶', '面包', '尿布'],
    ['牛奶', '尿布', '啤酒'],
    ['面包', '尿布'],
    ['牛奶', '面包', '啤酒'],
    ['牛奶', '面包', '尿布', '啤酒']
];

console.log("交易数据:", transactions);
console.log("总订单数:", transactions.length);

// 计算每个商品的支持度
const itemCount = {};
for (let trans of transactions) {
    for (let item of trans) {
        itemCount[item] = (itemCount[item] || 0) + 1;
    }
}
for (let [item, count] of Object.entries(itemCount)) {
    const support = count / transactions.length;
    console.log(\`\${item} 支持度: \${support.toFixed(2)}\`);
}

// 计算牛奶和面包的关联度
let milkAndBread = 0;
let milkCount = 0;
for (let trans of transactions) {
    const hasMilk = trans.includes('牛奶');
    const hasBread = trans.includes('面包');
    if (hasMilk) milkCount++;
    if (hasMilk && hasBread) milkAndBread++;
}
const confidence = milkAndBread / milkCount;
console.log("买牛奶同时买面包的置信度:", confidence.toFixed(2));`,
          explanation: "1. 计算每个商品的支持度；2. 计算关联规则的置信度。",
          questions: [
              { text:"提升度>1表示？", options:["正相关","负相关","独立"], correct:0, explanation:"Lift>1表示正相关。" },
              { text:"支持度的公式？", options:["包含X订单/总订单","包含X和Y/包含X","包含X和Y/总订单"], correct:0, explanation:"支持度=包含X订单/总订单。" },
              { text:"置信度的公式？", options:["Support(X∪Y)/Support(X)","Support(X)/Support(Y)","Support(X∪Y)"], correct:0, explanation:"置信度=同时包含X和Y/包含X。" },
              { text:"Apriori算法用于？", options:["关联规则","聚类","分类"], correct:0, explanation:"Apriori是关联规则算法。" },
              { text:"提升度Lift<1表示？", options:["负相关","正相关","独立"], correct:0, explanation:"Lift<1表示负相关。" },
              { text:"啤酒与尿布案例说明？", options:["关联规则","聚类","回归"], correct:0, explanation:"关联规则经典案例。" },
              { text:"最小支持度设置过高会导致？", options:["规则太少","规则太多","无影响"], correct:0, explanation:"支持度高规则少。" },
              { text:"association_rules()用于？", options:["生成规则","挖掘项集","数据清洗"], correct:0, explanation:"生成关联规则。" },
              { text:"频繁项集是指？", options:["支持度高的项集","置信度高的规则","提升度高的规则"], correct:0, explanation:"频繁项集支持度高。" },
              { text:"购物篮分析目的是？", options:["发现商品关联","预测销量","分类客户"], correct:0, explanation:"发现商品购买关联。" }
          ]},
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶",
          learn: `<h2>🔍 第四章：KMeans聚类分析</h2><p>KMeans是无监督学习算法，将相似的数据点分组。常用于客户分群、商品分类。</p>`,
          code: `// KMeans聚类简化实现
const customers = [
    [100, 5], [120, 6], [90, 4],   // 高价值客户
    [50, 2], [60, 3], [55, 2],     // 中等客户
    [10, 1], [15, 1], [8, 1]       // 低价值客户
];
console.log("客户数据(金额,频次):", customers);

// 简单KMeans (K=2)
function distance(a, b) {
    return Math.sqrt(Math.pow(a[0]-b[0], 2) + Math.pow(a[1]-b[1], 2));
}

const centroids = [[customers[0][0], customers[0][1]], [customers[8][0], customers[8][1]]];
let changed = true;
let iterations = 0;
while (changed && iterations < 10) {
    changed = false;
    const clusters = [[], []];
    for (let c of customers) {
        const dist0 = distance(c, centroids[0]);
        const dist1 = distance(c, centroids[1]);
        clusters[dist0 < dist1 ? 0 : 1].push(c);
    }
    for (let i = 0; i < 2; i++) {
        if (clusters[i].length === 0) continue;
        const newCenter = [
            clusters[i].reduce((s, p) => s + p[0], 0) / clusters[i].length,
            clusters[i].reduce((s, p) => s + p[1], 0) / clusters[i].length
        ];
        if (newCenter[0] !== centroids[i][0] || newCenter[1] !== centroids[i][1]) {
            centroids[i] = newCenter;
            changed = true;
        }
    }
    iterations++;

          learn: `<h2>📈 第六章：线性回归分析</h2><p>线性回归预测连续变量，假设y与x存在线性关系y = wx + b。</p>`,
          code: `// 线性回归简化实现
const dataPoints = [
    { x: 1, y: 2.1 }, { x: 2, y: 3.9 }, { x: 3, y: 6.0 },
    { x: 4, y: 7.8 }, { x: 5, y: 10.2 }, { x: 6, y: 11.9 }
];
console.log("训练数据:", dataPoints);

// 计算回归系数 y = w*x + b
let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
const n = dataPoints.length;
for (let p of dataPoints) {
    sumX += p.x;
    sumY += p.y;
    sumXY += p.x * p.y;
    sumX2 += p.x * p.x;
}
const w = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
const b = (sumY - w * sumX) / n;
console.log(\`回归方程: y = \${w.toFixed(2)}x + \${b.toFixed(2)}\`);

// 预测x=7
const predX7 = w * 7 + b;
console.log(\`预测x=7: y = \${predX7.toFixed(2)}\`);

// 计算R²
let sst = 0, ssr = 0;
const yMean = sumY / n;
for (let p of dataPoints) {
    sst += Math.pow(p.y - yMean, 2);
    const pred = w * p.x + b;
    ssr += Math.pow(p.y - pred, 2);
}
const r2 = 1 - (ssr / sst);
console.log(\`R²决定系数: \${r2.toFixed(4)}\`);`,

          code: `// 异常检测示例
const data = [10, 12, 13, 12, 11, 14, 13, 100, 12, 11];
console.log("原始数据:", data);

// Z-score方法
const mean = data.reduce((a,b) => a + b, 0) / data.length;
const variance = data.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / data.length;
const std = Math.sqrt(variance);

const zScores = data.map(x => Math.abs((x - mean) / std));
console.log("Z-score:", zScores.map(z => z.toFixed(2)));

const outliers = data.filter((_, i) => zScores[i] > 2);
console.log("异常值(Z>2):", outliers);

// IQR方法
const sorted = [...data].sort((a,b) => a - b);
const q1 = sorted[Math.floor(sorted.length * 0.25)];
const q3 = sorted[Math.floor(sorted.length * 0.75)];
const iqr = q3 - q1;
const lowerBound = q1 - 1.5 * iqr;
const upperBound = q3 + 1.5 * iqr;
console.log(\`IQR范围: [\${lowerBound}, \${upperBound}]\`);
const iqrOutliers = data.filter(x => x < lowerBound || x > upperBound);
console.log("IQR异常值:", iqrOutliers);`,

                        let logs = [];
                        const oldLog = console.log;
                        console.log = (...args) => { logs.push(args.join(' ')); };
                        const result = eval(code);
                        console.log = oldLog;
                        if(logs.length) out.innerText = logs.join('\n');
                        else if(result !== undefined) out.innerText = String(result);
                        else out.innerText = '执行完成';
                    } catch(e) { out.innerText = `错误：${e.message}`; }
                }, 50);
            };
            document.getElementById('copyCode').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('codeArea').value);
                alert('✅ 代码已复制');
            };
        } else if(currentMode === 'quiz') {
            const qs = quizState[currentProject.id];
            const questions = currentProject.questions;
            const isFinished = qs.answers.every(a=>a!==null);
            if(!qs.started) {
                container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ 10:00</div><button id="startQuizBtn" style="background:#7a9a6a; border:none; padding:0.6rem; border-radius:2rem; width:100%; color:white; cursor:pointer;">▶ 开始测验（${questions.length}道题）</button><div id="quizContent"></div></div>`;
                document.getElementById('startQuizBtn').onclick = () => { startTimer(currentProject.id); renderModeContent(); };
                return;
            }
            if(isFinished) {
                const correct = qs.answers.filter((a,i)=>a===questions[i].correct).length;
                container.innerHTML = `<div class="quiz-area"><div class="quiz-result">得分：${correct}/${questions.length}<br>${correct===questions.length?'🎉 完美通关！':'📚 继续努力！'}<button id="resetQuiz" style="background:#b0c0a8; border:none; padding:0.4rem 1rem; border-radius:2rem; margin-top:0.8rem; cursor:pointer;">重新测验</button></div></div>`;
                document.getElementById('resetQuiz')?.addEventListener('click',()=>{ stopTimer(currentProject.id); quizState[currentProject.id]={ answers:new Array(questions.length).fill(null), idx:0, time:10*60, timer:null, started:false }; renderModeContent(); });
                return;
            }
            const q = questions[qs.idx];
            const selected = qs.answers[qs.idx];
            let expHtml = '';
            if(selected !== undefined){
                const isCorrect = (selected === q.correct);
                expHtml = `<div class="explanation-box"><strong>${isCorrect?'✅ 回答正确！':'❌ 回答错误'}</strong><br>📖 解析：${q.explanation}<br>${!isCorrect?`💡 正确答案：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`:''}</div>`;
            }
            container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ ${formatTime(qs.time)}</div>
                <div class="question-item"><div>第 ${qs.idx+1}/${questions.length} 题</div><div style="margin:0.8rem 0">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${expHtml}<div class="quiz-actions"><button id="prevQ">◀ 上一题</button><button id="nextQ">${qs.idx===questions.length-1?'✅ 提交':'下一题 ▶'}</button></div></div></div>`;
            document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderModeContent(); }; });
            document.getElementById('prevQ').onclick = () => { if(qs.idx>0){ qs.idx--; renderModeContent(); } };
            document.getElementById('nextQ').onclick = () => { if(qs.answers[qs.idx]===null){ alert('请先选择答案'); return; } if(qs.idx<questions.length-1){ qs.idx++; renderModeContent(); }else{ stopTimer(currentProject.id); renderModeContent(); } };
        }
    }
    
    renderHome();
</script>
</body>
</html>
