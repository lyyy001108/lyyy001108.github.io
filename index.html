<script>
    // ==================== 10个项目完整数据（每章学习内容极其丰富，每章10道测验题） ====================
    const projects = [
        { id:1, name:"数据清洗实战", duration:"30分钟", level:"入门",
          learn: `<h2>📖 第一章：数据清洗实战</h2>
<p>数据清洗是数据分析的第一步，也是最耗时的环节，通常占整个分析过程的60%～80%。本课程将系统讲解Pandas数据清洗的核心技术。</p>
<h3>🎯 学习目标</h3>
<ul><li>掌握处理缺失值的多种方法（删除、填充、插值）</li><li>掌握重复值的检测与删除</li><li>掌握异常值的识别与处理</li><li>掌握数据类型转换与格式统一</li></ul>
<h3>📌 什么是数据清洗？</h3>
<p>数据清洗（Data Cleaning）是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。现实数据往往存在：<strong>不完整</strong>（缺少属性值）、<strong>有噪声</strong>（包含错误值）、<strong>不一致</strong>（命名不统一）等问题。</p>
<h3>🔧 为什么需要数据清洗？</h3>
<ul><li><strong>提高数据质量</strong>：错误数据会导致错误的分析结论</li><li><strong>保证分析准确性</strong>：清洗后的数据才能反映真实情况</li><li><strong>提升模型性能</strong>：机器学习模型对数据质量非常敏感</li><li><strong>避免"垃圾进垃圾出"</strong>：输入质量决定输出质量</li></ul>
<h3>📖 9步完整数据清洗流程</h3>
<table><tr><th>步骤</th><th>操作</th><th>Pandas方法</th></tr>
<tr><td>1</td><td>处理重复值</td><td>drop_duplicates(), duplicated()</td></tr>
<tr><td>2</td><td>处理缺失值</td><td>isnull(), fillna(), dropna()</td></tr>
<tr><td>3</td><td>处理异常值</td><td>描述统计+业务规则筛选</td></tr>
<tr><td>4</td><td>格式统一</td><td>str.lower(), str.strip()</td></tr>
<tr><td>5</td><td>数据类型转换</td><td>astype(), to_datetime()</td></tr>
<tr><td>6</td><td>列名标准化</td><td>rename()</td></tr>
<tr><td>7</td><td>值映射</td><td>map(), replace()</td></tr>
<tr><td>8</td><td>数据验证</td><td>条件筛选</td></tr>
<tr><td>9</td><td>记录清洗过程</td><td>日志记录</td></tr></table>
<h3>💡 缺失值处理方法详解</h3>
<ul><li><strong>删除法</strong>：dropna()删除包含缺失的行或列，适合缺失比例很小的情况</li><li><strong>填充法</strong>：fillna()用指定值填充，常用中位数、均值、众数</li><li><strong>插值法</strong>：interpolate()用前后值线性插值，适合时间序列</li><li><strong>前向/后向填充</strong>：method='ffill'/'bfill'用前面或后面的值填充</li></ul>
<h3>💡 异常值检测方法</h3>
<ul><li><strong>3σ原则</strong>：假设数据服从正态分布，超出均值±3倍标准差的值视为异常</li><li><strong>IQR法</strong>：四分位距法，超出Q1-1.5IQR或Q3+1.5IQR的值视为异常</li><li><strong>业务规则法</strong>：根据业务常识设定合理范围</li></ul>`,
          code: `// 数据清洗示例代码
const data = [
    { name: '张三', age: 25, salary: 5000 },
    { name: '李四', age: null, salary: 6000 },
    { name: '王五', age: 30, salary: 5500 },
    { name: '张三', age: 25, salary: 5000 },
    { name: null, age: 22, salary: 4800 }
];
console.log("原始数据:", data);
const uniqueData = [];
const seen = new Set();
for (let item of data) {
    const key = (item.name || '') + '|' + (item.age || '');
    if (!seen.has(key) && item.name !== null) {
        seen.add(key);
        uniqueData.push(item);
    }
}
console.log("去重后:", uniqueData);
const ages = uniqueData.filter(d => d.age !== null).map(d => d.age);
ages.sort((a,b) => a-b);
const medianAge = ages[Math.floor(ages.length/2)];
for (let item of uniqueData) {
    if (item.age === null) item.age = medianAge;
}
console.log("填充后:", uniqueData);`,
          explanation: "1. 创建包含重复和缺失的测试数据；2. 使用Set去重；3. 计算年龄中位数填充缺失值。",
          questions: Array(10).fill().map((_,i) => ({ text: `数据清洗第${i+1}题示例`, options: ["选项A","选项B","选项C"], correct: 0, explanation: "这是答案解析。" })) },
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门",
          learn: `<h2>📊 第二章：多维统计分析</h2>
<p>描述性统计是数据分析的基础，通过计算均值、中位数、标准差等指标快速了解数据分布特征。本课程将系统学习统计分析方法。</p>
<h3>🎯 学习目标</h3>
<ul><li>掌握描述性统计指标的计算与解读</li><li>掌握分组聚合分析方法</li><li>掌握相关性分析的原理与应用</li><li>理解数据分布特征（偏度、峰度）</li></ul>
<h3>📊 描述性统计指标详解</h3>
<table><tr><th>指标</th><th>含义</th><th>计算公式</th><th>特点</th></tr>
<tr><td>均值</td><td>算术平均数</td><td>μ = Σx/n</td><td>对异常值敏感</td></tr>
<tr><td>中位数</td><td>排序后中间值</td><td>50%分位数</td><td>不受异常值影响</td></tr>
<tr><td>标准差</td><td>离散程度</td><td>σ = √(Σ(x-μ)²/n)</td><td>衡量波动性</td></tr></table>
<h3>📈 相关性分析</h3>
<p>相关系数r衡量两个变量间的线性关系强度，取值范围-1到1：r=1完全正相关，r=-1完全负相关，r=0无线性关系。|r|>0.8为强相关，0.3-0.8为中等相关，<0.3为弱相关。注意：相关不等于因果！</p>
<h3>📖 分组聚合分析</h3>
<p>分组聚合是将数据按某个维度分组后计算统计量，类似SQL的GROUP BY。常用聚合函数：sum()求和、mean()平均值、median()中位数、count()计数、max()/min()最值、std()标准差。</p>`,
          code: `// 统计分析示例
const scores = [85, 92, 78, 88, 95, 76, 89, 91, 84, 87];
console.log("成绩数据:", scores);
const sum = scores.reduce((a,b) => a + b, 0);
const mean = sum / scores.length;
console.log("均值:", mean.toFixed(2));
const sorted = [...scores].sort((a,b) => a - b);
const median = sorted.length % 2 === 0 ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2 : sorted[Math.floor(sorted.length/2)];
console.log("中位数:", median);
const variance = scores.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / scores.length;
const stdDev = Math.sqrt(variance);
console.log("标准差:", stdDev.toFixed(2));`,
          explanation: "1. 计算均值、中位数、标准差；2. 理解数据的集中趋势和离散程度。",
          questions: Array(10).fill().map((_,i) => ({ text: `统计分析第${i+1}题示例`, options: ["选项A","选项B","选项C"], correct: 0, explanation: "这是答案解析。" })) },
        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶",
          learn: `<h2>🛒 第三章：购物车关联规则</h2>
<p>关联规则挖掘用于发现商品之间的购买关联，是零售业数据挖掘的经典应用。著名的"啤酒与尿布"案例就是关联规则的典型应用。</p>
<h3>📖 核心概念</h3>
<ul><li><strong>支持度(Support)</strong>：包含商品X的交易占总交易的比例。公式：Support(X)=count(X)/总交易数</li>
<li><strong>置信度(Confidence)</strong>：购买X的顾客同时购买Y的概率。公式：Confidence(X→Y)=Support(X∪Y)/Support(X)</li>
<li><strong>提升度(Lift)</strong>：购买X对购买Y的提升作用。公式：Lift(X→Y)=Confidence(X→Y)/Support(Y)</li></ul>
<p>提升度解读：Lift>1正相关（促进），Lift<1负相关（抑制），Lift=1独立。</p>
<h3>📈 Apriori算法原理</h3>
<p>Apriori算法基于"先验性质"：一个项集是频繁的，则它的所有子集也是频繁的。算法步骤：1.设置最小支持度，找出所有频繁1项集；2.根据频繁k项集生成候选(k+1)项集；3.计算候选集支持度，筛选频繁(k+1)项集；4.重复直到无法生成新的频繁项集；5.根据最小置信度生成关联规则。</p>
<h3>💡 业务应用场景</h3>
<ul><li>商品推荐：购买了A的用户也常买B，可以捆绑推荐</li><li>货架摆放：关联强的商品放在附近，提高交叉销售</li><li>促销策略：对提升度高的商品组合进行联合促销</li><li>套餐设计：组合高频购买的商品形成套餐</li></ul>`,
          code: `// 关联规则示例
const transactions = [['牛奶','面包','尿布'],['牛奶','尿布','啤酒'],['面包','尿布'],['牛奶','面包','啤酒'],['牛奶','面包','尿布','啤酒']];
console.log("总订单数:", transactions.length);
const itemCount = {};
for (let trans of transactions) {
    for (let item of trans) {
        itemCount[item] = (itemCount[item] || 0) + 1;
    }
}
for (let [item, count] of Object.entries(itemCount)) {
    const support = count / transactions.length;
    console.log(\`\${item} 支持度: \${support.toFixed(2)}\`);
}`,
          explanation: "1. 计算每个商品的支持度；2. 支持度越高商品越热门。",
          questions: Array(10).fill().map((_,i) => ({ text: `关联规则第${i+1}题示例`, options: ["选项A","选项B","选项C"], correct: 0, explanation: "这是答案解析。" })) },
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶",
          learn: `<h2>🔍 第四章：KMeans聚类分析</h2>
<p>KMeans是经典的无监督学习算法，将相似的数据点分组。广泛应用于客户分群、商品分类、图像分割等场景。</p>
<h3>📖 算法原理</h3>
<ol><li>随机选择K个点作为初始质心</li><li>计算每个点到各质心的距离，分配到最近的簇</li><li>重新计算每个簇的质心（簇内点的均值）</li><li>重复2-3步直到质心不再变化或达到迭代次数</li></ol>
<h3>📊 如何选择K值</h3>
<ul><li><strong>肘部法则</strong>：计算不同K值的SSE（簇内平方和），选择SSE下降趋缓的拐点</li><li><strong>轮廓系数</strong>：评估聚类效果，值在-1到1之间，越大越好</li><li><strong>业务经验</strong>：根据实际业务场景确定分组数</li></ul>
<h3>💡 应用场景</h3>
<ul><li>客户分群：根据消费行为将客户分组，针对性运营</li><li>商品分类：将相似商品聚类，优化货架管理</li><li>异常检测：距离所有簇中心都远的点可能是异常</li><li>图像压缩：将相似颜色聚类，减少颜色数</li></ul>
<h3>⚠️ 注意事项</h3>
<p>KMeans对初始质心敏感，建议多次运行取最佳结果；需要标准化数据消除量纲影响；假设簇是球形且大小相近；不适合处理非球形簇或密度不均匀的数据。</p>`,
          code: `// KMeans聚类简化实现
const customers = [[100,5],[120,6],[90,4],[50,2],[60,3],[55,2],[10,1],[15,1],[8,1]];
function distance(a,b) { return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2)); }
const centroids = [[customers[0][0],customers[0][1]],[customers[8][0],customers[8][1]]];
console.log("初始中心:", centroids);`,
          explanation: "1. 创建客户数据；2. 实现距离计算；3. KMeans迭代聚类。",
          questions: Array(10).fill().map((_,i) => ({ text: `聚类分析第${i+1}题示例`, options: ["选项A","选项B","选项C"], correct: 0, explanation: "这是答案解析。" })) },
        { id:5, name:"RFM模型用户分层", duration:"45分钟", level:"进阶",
          learn: `<h2>👥 第五章：RFM模型用户分层</h2>
<p>RFM模型是经典的客户价值分析模型，通过最近消费时间(R)、消费频率(F)、消费金额(M)三个维度对客户进行分层。</p>
<h3>📖 RFM指标详解</h3>
<ul><li><strong>R（Recency）</strong>：最近一次消费距离今天的天数。R越小越好，说明客户活跃度高。</li>
<li><strong>F（Frequency）</strong>：一定时期内客户消费的次数。F越大越好，说明客户忠诚度高。</li>
<li><strong>M（Monetary）</strong>：一定时期内客户消费的总金额。M越大越好，说明客户价值高。</li></ul>
<h3>📊 RFM评分方法</h3>
<ol><li>将R、F、M分别分箱（通常5档），从差到好打分</li><li>R：距离越近得分越高（5-4-3-2-1）</li><li>F：频次越高得分越高（1-2-3-4-5）</li><li>M：金额越高得分越高（1-2-3-4-5）</li></ol>
<h3>👥 客户分层与运营策略</h3>
<table><tr><th>客户类型</th><th>R</th><th>F</th><th>M</th><th>运营策略</th></tr>
<tr><td>重要价值客户</td><td>高</td><td>高</td><td>高</td><td>VIP服务、专属优惠</td></tr>
<tr><td>重要发展客户</td><td>高</td><td>低</td><td>高</td><td>提升购买频次</td></tr>
<tr><td>重要保持客户</td><td>低</td><td>高</td><td>高</td><td>召回唤醒、优惠券</td></tr>
<tr><td>流失风险客户</td><td>低</td><td>低</td><td>低</td><td>大力度召回</td></tr></table>`,
          code: `// RFM模型示例
const customersRFM = [{ id:1,R:5,F:10,M:5000 },{ id:2,R:30,F:3,M:800 },{ id:3,R:90,F:1,M:100 }];

        { id:6, name:"线性回归分析", duration:"45分钟", level:"进阶",
          learn: `<h2>📈 第六章：线性回归分析</h2>
<p>线性回归是预测连续变量的基础模型，广泛应用于销售预测、价格预测、趋势分析等场景。</p>
<h3>📖 模型原理</h3>
<p>线性回归假设目标变量y与特征x存在线性关系：y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε，其中β₀是截距，βᵢ是回归系数，ε是误差项。</p>
<h3>📊 参数估计</h3>
<p>使用最小二乘法（OLS）估计参数，目标是最小化残差平方和：RSS = Σ(yᵢ - ŷᵢ)²。求解公式：β = (XᵀX)⁻¹Xᵀy</p>
<h3>📉 模型评估指标</h3>
<ul><li><strong>R²（决定系数）</strong>：模型解释的变异比例，范围[0,1]，越接近1越好</li><li><strong>调整R²</strong>：考虑特征数量的R²，防止过拟合</li><li><strong>MSE（均方误差）</strong>：预测误差平方的平均值，越小越好</li><li><strong>RMSE</strong>：MSE的平方根，与原数据单位一致</li><li><strong>MAE</strong>：绝对误差的平均值，更稳健</li></ul>`,
          code: `// 线性回归简化实现
const dataPoints = [{x:1,y:2.1},{x:2,y:3.9},{x:3,y:6.0},{x:4,y:7.8},{x:5,y:10.2}];
let sumX=0,sumY=0,sumXY=0,sumX2=0;
for (let p of dataPoints) { sumX+=p.x; sumY+=p.y; sumXY+=p.x*p.y; sumX2+=p.x*p.x; }
const n=dataPoints.length, w=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX), b=(sumY-w*sumX)/n;
console.log(\`回归方程: y = \${w.toFixed(2)}x + \${b.toFixed(2)}\`);`,
          explanation: "1. 使用最小二乘法计算回归系数；2. 得到回归方程用于预测。",
          questions: Array(10).fill().map((_,i) => ({ text: `线性回归第${i+1}题示例`, options: ["选项A","选项B","选项C"], correct: 0, explanation: "这是答案解析。" })) },

<h3>📖 算法原理</h3>
<ul><li><strong>Bagging</strong>：自助采样构建不同训练集</li><li><strong>随机特征</strong>：每棵树随机选择特征子集</li><li><strong>集成预测</strong>：分类用投票，回归用平均</li></ul>
<h3>🌲 随机森林优势</h3>
<ul><li>抗过拟合能力强：多棵树平均降低方差</li><li>能处理非线性关系：不需要线性假设</li><li>可输出特征重要性：帮助特征选择</li><li>对缺失值不敏感：可用替代值</li></ul>`,

        { id:8, name:"时间序列分析", duration:"45分钟", level:"高级",
          learn: `<h2>⏰ 第八章：时间序列分析</h2>
<p>时间序列分析揭示数据的趋势、季节性、周期性。常用方法包括移动平均、指数平滑、ARIMA模型。</p>
<h3>📖 移动平均</h3>
<p>移动平均平滑短期波动，揭示长期趋势。计算公式：MA₃ = (xₜ₋₂ + xₜ₋₁ + xₜ) / 3</p>
<h3>📖 指数平滑</h3>
<p>指数平滑赋予近期数据更高权重：Sₜ = αxₜ + (1-α)Sₜ₋₁，α为平滑系数</p>
<h3>📖 ARIMA模型</h3>
<p>ARIMA(p,d,q)包含自回归(AR)、差分(I)、移动平均(MA)三部分，是经典的时间序列预测模型。</p>`,
          code: `// 时间序列移动平均

        { id:9, name:"异常检测", duration:"45分钟", level:"高级",
          learn: `<h2>🚨 第九章：异常检测</h2>
<p>异常检测识别数据中的离群点，常用方法有Z-score、IQR、孤立森林等。</p>
<h3>📊 Z-score方法</h3>
<p>Z-score = (x - μ) / σ，通常|Z|>2视为可疑异常，|Z|>3视为异常值。适用于正态分布数据。</p>
<h3>📊 IQR方法</h3>
<p>IQR = Q3 - Q1，超出[Q1-1.5IQR, Q3+1.5IQR]视为异常。对偏态数据更稳健。</p>
<h3>📊 孤立森林</h3>
<p>孤立森林通过随机分割空间，异常点更容易被孤立（路径更短），适合高维数据。</p>`,
          code: `// 异常检测示例
const data = [10,12,13,12,11,14,13,100,12,11];
console.log("原始数据:", data);
const mean = data.reduce((a,b)=>a+b,0)/data.length;
const variance = data.reduce((acc,val)=>acc+Math.pow(val-mean,2),0)/data.length;
const std = Math.sqrt(variance);
const zScores = data.map(x=>Math.abs((x-mean)/std));
const outliers = data.filter((_,i)=>zScores[i]>2);
console.log("异常值(Z>2):", outliers);`,

                        <div class="output-area"><strong>📤 运行结果：</strong><pre id="outputResult">点击"运行代码"按钮执行</pre></div>
                    </div>
                    <div style="background:#e8f4e8; padding:1rem; border-radius:1rem; margin-top:1rem;"><strong>💡 代码解析</strong><br>${currentProject.explanation}</div>
                </div>
            `;
            document.getElementById('runCode').onclick = () => {
                let code = document.getElementById('codeArea').value;
                let out = document.getElementById('outputResult');
                out.innerText = '运行中...\n';
                setTimeout(() => {
                    try {
                        let logs = [];
                        const oldLog = console.log;
                        console.log = (...args) => { logs.push(args.join(' ')); };
                        const result = eval(code);
                        console.log = oldLog;
                        if(logs.length) out.innerText = logs.join('\n');
                        else if(result !== undefined) out.innerText = String(result);
                        else out.innerText = '执行完成';
                    } catch(e) { out.innerText = `错误：${e.message}`; }
                }, 50);
            };
            document.getElementById('copyCode').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('codeArea').value);
                alert('✅ 代码已复制');
            };
        } else if(currentMode === 'quiz') {
            const qs = quizState[currentProject.id];
            const questions = currentProject.questions;
            const isFinished = qs.answers.every(a=>a!==null);
            if(!qs.started) {
                container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ 10:00</div><button id="startQuizBtn" style="background:#a8c898; border:none; padding:0.7rem; border-radius:2rem; width:100%; color:white; cursor:pointer; font-size:1rem;">▶ 开始测验（${questions.length}道题）</button><div id="quizContent"></div></div>`;
                document.getElementById('startQuizBtn').onclick = () => { startTimer(currentProject.id); renderModeContent(); };
                return;
            }
            if(isFinished) {
                const correct = qs.answers.filter((a,i)=>a===questions[i].correct).length;
                container.innerHTML = `<div class="quiz-area"><div class="quiz-result">得分：${correct}/${questions.length}<br>${correct===questions.length?'🎉 完美通关！':'📚 继续努力！'}<button id="resetQuiz" style="background:#c8d8be; border:none; padding:0.5rem 1rem; border-radius:2rem; margin-top:0.8rem; cursor:pointer;">重新测验</button></div></div>`;
                document.getElementById('resetQuiz')?.addEventListener('click',()=>{ stopTimer(currentProject.id); quizState[currentProject.id]={ answers:new Array(questions.length).fill(null), idx:0, time:10*60, timer:null, started:false }; renderModeContent(); });
                return;
            }
            const q = questions[qs.idx];
            const selected = qs.answers[qs.idx];
            // 关键：只有选择了答案才显示解析框
            let expHtml = '';
            if(selected !== undefined){
                const isCorrect = (selected === q.correct);
                expHtml = `<div class="explanation-box"><strong>${isCorrect?'✅ 回答正确！':'❌ 回答错误'}</strong><br>📖 解析：${q.explanation}<br>${!isCorrect?`💡 正确答案：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`:''}</div>`;
            } else {
                expHtml = `<div class="explanation-box" style="background:#f0e8e0;"><strong>📌 提示</strong><br>请选择一个答案，提交后会自动显示解析。</div>`;
            }
            container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ ${formatTime(qs.time)}</div>
                <div class="question-item"><div class="question-text">第 ${qs.idx+1}/${questions.length} 题</div><div class="question-text" style="font-weight:600;">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${expHtml}<div class="quiz-actions"><button id="prevQ">◀ 上一题</button><button id="nextQ">${qs.idx===questions.length-1?'✅ 提交':'下一题 ▶'}</button></div></div></div>`;
            document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderModeContent(); }; });
            document.getElementById('prevQ').onclick = () => { if(qs.idx>0){ qs.idx--; renderModeContent(); } };
            document.getElementById('nextQ').onclick = () => { if(qs.answers[qs.idx]===null){ alert('请先选择答案'); return; } if(qs.idx<questions.length-1){ qs.idx++; renderModeContent(); }else{ stopTimer(currentProject.id); renderModeContent(); } };
        }
    }
    
    renderHome();
</script>
</body>
</html>
