<body>
<div id="app"></div>

<script>
    // ==================== 10个项目完整数据（内容极度丰富） ====================
    const projects = [
        { id:1, name:"数据清洗实战", duration:"30分钟", level:"入门",
          learn: `<h2>📖 第一章：数据清洗实战</h2>
<p>数据清洗是数据分析的第一步，也是最耗时的环节，通常占整个分析过程的60%～80%。本课程将系统讲解Pandas数据清洗的核心技术。</p>
<h3>🎯 学习目标</h3>
<ul><li>掌握处理缺失值的多种方法（删除、填充、插值）</li><li>掌握重复值的检测与删除</li><li>掌握异常值的识别与处理</li><li>掌握数据类型转换与格式统一</li></ul>
<h3>📌 什么是数据清洗？</h3>
<p>数据清洗（Data Cleaning）是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。</p>
<h3>🔧 为什么需要数据清洗？</h3>
<ul><li><strong>提高数据质量</strong>：错误数据会导致错误的分析结论</li><li><strong>保证分析准确性</strong>：清洗后的数据才能反映真实情况</li><li><strong>提升模型性能</strong>：机器学习模型对数据质量非常敏感</li></ul>
<h3>📖 9步完整数据清洗流程</h3>
<table><tr><th>步骤</th><th>操作</th><th>方法</th></tr>
<tr><td>1</td><td>处理重复值</td><td>drop_duplicates()</td></tr>
<tr><td>2</td><td>处理缺失值</td><td>fillna() / dropna()</td></tr>
<tr><td>3</td><td>处理异常值</td><td>业务规则筛选</td></tr>
<tr><td>4</td><td>格式统一</td><td>str.strip()</td></tr>
<tr><td>5</td><td>数据类型转换</td><td>astype()</td></tr>
<tr><td>6</td><td>列名标准化</td><td>rename()</td></tr>
<tr><td>7</td><td>值映射</td><td>map() / replace()</td></tr>
<tr><td>8</td><td>数据验证</td><td>条件筛选</td></tr>
<tr><td>9</td><td>记录清洗过程</td><td>日志记录</td></tr>
</table>
<h3>💡 缺失值处理方法详解</h3>
<ul><li><strong>删除法</strong>：dropna()删除包含缺失的行，适合缺失比例很小的情况</li><li><strong>填充法</strong>：fillna()用指定值填充，常用中位数、均值、众数</li><li><strong>插值法</strong>：interpolate()用前后值线性插值，适合时间序列</li></ul>`,
          code: `// 数据清洗示例代码
const data = [
    { name: '张三', age: 25, salary: 5000 },
    { name: '李四', age: null, salary: 6000 },
    { name: '王五', age: 30, salary: 5500 },
    { name: '张三', age: 25, salary: 5000 },
    { name: null, age: 22, salary: 4800 }
];

console.log("原始数据:", data);
console.log("原始数据条数:", data.length);

// 1. 去重（根据name和age）
const uniqueData = [];
const seen = new Set();
for (let item of data) {
    const key = (item.name || '') + '|' + (item.age || '');
    if (!seen.has(key) && item.name !== null) {
        seen.add(key);
        uniqueData.push(item);
    }
}
console.log("去重后条数:", uniqueData.length);

// 2. 处理缺失值（年龄用中位数填充）
const ages = uniqueData.filter(d => d.age !== null).map(d => d.age);
ages.sort((a,b) => a-b);
const medianAge = ages[Math.floor(ages.length/2)];
for (let item of uniqueData) {
    if (item.age === null) item.age = medianAge;
}
console.log("填充后数据:", uniqueData);`,
          explanation: "1. 创建包含重复和缺失的测试数据；2. 使用Set实现去重；3. 计算年龄中位数填充缺失值。",
          questions: [
              { text:"数据清洗通常占分析过程的多少比例？", options:["20-30%","40-50%","60-80%"], correct:2, explanation:"数据清洗耗时最多，占60%～80%。" },
              { text:"处理缺失值的常用方法有？", options:["删除","填充","以上都是"], correct:2, explanation:"删除和填充都是常用方法。" },
              { text:"drop_duplicates()方法的作用是？", options:["删除重复行","删除缺失行","填充缺失值"], correct:0, explanation:"drop_duplicates()删除重复行。" },
              { text:"处理异常值的常用方法是？", options:["业务规则筛选","随机删除","保留所有"], correct:0, explanation:"根据业务规则筛选合理范围。" },
              { text:"fillna()方法用于？", options:["填充缺失值","删除缺失值","检测缺失值"], correct:0, explanation:"fillna()填充缺失值。" },
              { text:"数据清洗的目的是？", options:["提高数据质量","增加数据量","加快计算"], correct:0, explanation:"主要目的是提高数据质量。" },
              { text:"astype()方法用于？", options:["数据类型转换","删除重复","填充缺失"], correct:0, explanation:"astype()转换数据类型。" },
              { text:"str.strip()方法的作用是？", options:["去除首尾空格","转换为大写","拆分字符串"], correct:0, explanation:"strip()去除字符串首尾空格。" },
              { text:"duplicated()方法返回什么？", options:["布尔序列","数值序列","DataFrame"], correct:0, explanation:"duplicated()返回布尔型Series。" },
              { text:"处理缺失值时，什么情况下适合用删除？", options:["缺失比例很小","缺失比例很大","数据量很小"], correct:0, explanation:"缺失比例小时删除影响不大。" }
          ]},
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门",
          learn: `<h2>📊 第二章：多维统计分析</h2>
<p>描述性统计是数据分析的基础，通过计算均值、中位数、标准差等指标快速了解数据分布特征。</p>
<h3>📊 描述性统计指标详解</h3>
<table><tr><th>指标</th><th>含义</th><th>计算公式</th></tr>
<tr><td>均值</td><td>算术平均数</td><td>μ = Σx/n</td></tr>
<tr><td>中位数</td><td>排序后中间值</td><td>50%分位数</td></tr>
<tr><td>标准差</td><td>离散程度</td><td>σ = √(Σ(x-μ)²/n)</td></tr>
</table>
<h3>📈 相关性分析</h3>
<p>相关系数r衡量两个变量间的线性关系强度，范围-1到1：|r|>0.8为强相关，0.3-0.8为中等相关，<0.3为弱相关。</p>`,
          code: `// 统计分析示例
const scores = [85, 92, 78, 88, 95, 76, 89, 91, 84, 87];
console.log("成绩数据:", scores);

// 计算均值
const sum = scores.reduce((a,b) => a + b, 0);
const mean = sum / scores.length;
console.log("均值:", mean.toFixed(2));

// 计算中位数
const sorted = [...scores].sort((a,b) => a - b);
const median = sorted.length % 2 === 0 
    ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2
    : sorted[Math.floor(sorted.length/2)];
console.log("中位数:", median);

// 计算标准差
const variance = scores.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / scores.length;
const stdDev = Math.sqrt(variance);
console.log("标准差:", stdDev.toFixed(2));`,
          explanation: "1. 计算均值、中位数、标准差；2. 理解数据的集中趋势和离散程度。",
          questions: [
              { text:"受异常值影响最大的指标是？", options:["均值","中位数","众数"], correct:0, explanation:"均值对所有值敏感。" },
              { text:"中位数的特点是？", options:["不受异常值影响","受异常值影响","等于均值"], correct:0, explanation:"中位数对异常值不敏感。" },
              { text:"标准差衡量什么？", options:["离散程度","集中趋势","分布形状"], correct:0, explanation:"标准差表示数据波动大小。" }
          ]},
        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶",
          learn: `<h2>🛒 第三章：购物车关联规则</h2>
<p>关联规则挖掘用于发现商品之间的购买关联，是零售业数据挖掘的经典应用。著名的"啤酒与尿布"案例就是关联规则的典型应用。</p>
<h3>📖 核心概念</h3>
<ul><li><strong>支持度(Support)</strong>：包含商品X的交易占总交易的比例</li>
<li><strong>置信度(Confidence)</strong>：购买X的顾客同时购买Y的概率</li>
<li><strong>提升度(Lift)</strong>：购买X对购买Y的提升作用，Lift>1正相关，Lift<1负相关</li></ul>`,
          code: `// 关联规则示例
const transactions = [
    ['牛奶', '面包', '尿布'],
    ['牛奶', '尿布', '啤酒'],
    ['面包', '尿布'],
    ['牛奶', '面包', '啤酒'],
    ['牛奶', '面包', '尿布', '啤酒']
];

console.log("总订单数:", transactions.length);

// 计算每个商品的支持度
const itemCount = {};
for (let trans of transactions) {
    for (let item of trans) {
        itemCount[item] = (itemCount[item] || 0) + 1;
    }
}
for (let [item, count] of Object.entries(itemCount)) {
    const support = count / transactions.length;
    console.log(\`\${item} 支持度: \${support.toFixed(2)}\`);
}`,
          explanation: "1. 计算每个商品的支持度；2. 支持度越高商品越热门。",
          questions: [
              { text:"提升度>1表示？", options:["正相关","负相关","独立"], correct:0, explanation:"Lift>1表示正相关。" },
              { text:"支持度的公式？", options:["包含X订单/总订单","包含X和Y/包含X","包含X和Y/总订单"], correct:0, explanation:"支持度=包含X订单/总订单。" }
          ]},
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶",
          learn: `<h2>🔍 第四章：KMeans聚类分析</h2>
<p>KMeans是经典的无监督学习算法，将相似的数据点分组。广泛应用于客户分群、商品分类、图像分割等场景。</p>
<h3>📖 算法原理</h3>
<ol><li>随机选择K个点作为初始质心</li><li>计算每个点到各质心的距离，分配到最近的簇</li><li>重新计算每个簇的质心（簇内点的均值）</li><li>重复直到质心不再变化</li></ol>`,
          code: `// KMeans聚类简化实现
const customers = [
    [100, 5], [120, 6], [90, 4],   // 高价值
    [50, 2], [60, 3], [55, 2],     // 中等
    [10, 1], [15, 1], [8, 1]       // 低价值
];

function distance(a, b) {
    return Math.sqrt(Math.pow(a[0]-b[0], 2) + Math.pow(a[1]-b[1], 2));
}

// 初始化两个簇中心
const centroids = [[customers[0][0], customers[0][1]], [customers[8][0], customers[8][1]]];
console.log("初始中心:", centroids);`,
          explanation: "1. 创建客户数据；2. 实现距离计算；3. KMeans迭代聚类。",
          questions: [
              { text:"KMeans属于什么学习？", options:["无监督","监督","强化"], correct:0, explanation:"KMeans不需要标签。" },
              { text:"选择K值的方法？", options:["肘部法则","梯度下降","反向传播"], correct:0, explanation:"肘部法则选择K值。" }
          ]},
        { id:5, name:"RFM模型用户分层", duration:"45分钟", level:"进阶",
          learn: `<h2>👥 第五章：RFM模型用户分层</h2>
<p>RFM模型是经典的客户价值分析模型，通过最近消费时间(R)、消费频率(F)、消费金额(M)三个维度对客户进行分层。</p>
<h3>👥 客户分层与运营策略</h3>

<tr><td>重要价值客户</td><td>高</td><td>高</td><td>高</td><td>VIP服务</td></tr>

<tr><td>流失风险客户</td><td>低</td><td>低</td><td>低</td><td>召回唤醒</td></tr>
</table>`,
          code: `// RFM模型示例

          ]},
        { id:6, name:"线性回归分析", duration:"45分钟", level:"进阶",
          learn: `<h2>📈 第六章：线性回归分析</h2>
<p>线性回归是预测连续变量的基础模型，广泛应用于销售预测、价格预测等场景。</p>
<h3>📖 模型原理</h3>
<p>线性回归假设目标变量y与特征x存在线性关系：y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε</p>
<h3>📉 模型评估指标</h3>
<ul><li><strong>R²（决定系数）</strong>：模型解释的变异比例，越接近1越好</li><li><strong>MSE（均方误差）</strong>：预测误差平方的平均值</li></ul>`,
          code: `// 线性回归简化实现
const dataPoints = [
    { x: 1, y: 2.1 }, { x: 2, y: 3.9 }, { x: 3, y: 6.0 },
    { x: 4, y: 7.8 }, { x: 5, y: 10.2 }
];

let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
for (let p of dataPoints) {
    sumX += p.x;
    sumY += p.y;
    sumXY += p.x * p.y;
    sumX2 += p.x * p.x;
}
const n = dataPoints.length;
const w = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
const b = (sumY - w * sumX) / n;
console.log(\`回归方程: y = \${w.toFixed(2)}x + \${b.toFixed(2)}\`);`,
          explanation: "1. 使用最小二乘法计算回归系数；2. 得到回归方程用于预测。",
          questions: [
              { text:"线性回归预测什么类型？", options:["连续值","离散值","类别值"], correct:0, explanation:"预测连续数值。" },
              { text:"R²的取值范围？", options:["[0,1]","[-1,1]","[0,∞]"], correct:0, explanation:"越接近1拟合越好。" }
          ]},
        { id:7, name:"随机森林预测", duration:"60分钟", level:"高级",
          learn: `<h2>🌲 第七章：随机森林预测</h2>
<p>随机森林是集成学习算法，通过构建多棵决策树并取平均来预测。优点是抗过拟合、能处理非线性关系。</p>
<h3>📖 算法原理</h3>
<ul><li><strong>Bagging</strong>：自助采样构建不同训练集</li><li><strong>随机特征</strong>：每棵树随机选择特征子集</li><li><strong>集成预测</strong>：分类用投票，回归用平均</li></ul>`,
          code: `// 随机森林模拟 - 多棵树投票
const tree1 = [85, 92, 78];
const tree2 = [82, 90, 80];
const tree3 = [87, 91, 76];
const actual = [83, 91, 78];

// 集成预测（平均）
const ensemblePred = [];

console.log("实际值:", actual);`,

          ]},
        { id:8, name:"时间序列分析", duration:"45分钟", level:"高级",
          learn: `<h2>⏰ 第八章：时间序列分析</h2>
<p>时间序列分析揭示数据的趋势、季节性、周期性。常用方法包括移动平均、指数平滑、ARIMA模型。</p>
<h3>📖 移动平均</h3>
<p>移动平均平滑短期波动，揭示长期趋势。计算公式：MA₃ = (xₜ₋₂ + xₜ₋₁ + xₜ) / 3</p>`,
          code: `// 时间序列移动平均
const sales = [100, 110, 105, 120, 115, 130, 125, 140, 135, 150];
console.log("原始销量:", sales);

// 3期移动平均

        { id:9, name:"异常检测", duration:"45分钟", level:"高级",
          learn: `<h2>🚨 第九章：异常检测</h2>
<p>异常检测识别数据中的离群点，常用方法有Z-score、IQR、孤立森林等。</p>
<h3>📊 Z-score方法</h3>
<p>Z-score = (x - μ) / σ，通常|Z|>2视为可疑异常，|Z|>3视为异常值。</p>
<h3>📊 IQR方法</h3>
<p>IQR = Q3 - Q1，超出[Q1-1.5IQR, Q3+1.5IQR]视为异常。</p>`,
          code: `// 异常检测示例
const data = [10, 12, 13, 12, 11, 14, 13, 100, 12, 11];
console.log("原始数据:", data);

// Z-score方法
const mean = data.reduce((a,b) => a + b, 0) / data.length;
const variance = data.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / data.length;
const std = Math.sqrt(variance);
const zScores = data.map(x => Math.abs((x - mean) / std));
const outliers = data.filter((_, i) => zScores[i] > 2);
console.log("异常值(Z>2):", outliers);`,
          explanation: "1. 计算Z-score检测异常；2. |Z|>2视为可疑异常。",
          questions: [
              { text:"Z-score>3视为？", options:["异常","正常","边界"], correct:0, explanation:"Z>3视为异常。" }
          ]},
        { id:10, name:"全流程综合项目", duration:"60分钟", level:"高级",
          learn: `<h2>🏆 第十章：全流程综合项目</h2>
<p>综合运用所有技能完成完整商业分析流程：问题定义→数据采集→数据清洗→分析建模→可视化→报告输出。</p>
<h3>📋 分析流程</h3>

          code: `// 完整数据分析流程
console.log("===== 完整数据分析流程 =====");

// 1. 数据准备
const salesData = [
    { month: 1, sales: 1200, cost: 800 },
    { month: 2, sales: 1350, cost: 850 },
    { month: 3, sales: 1100, cost: 750 },
    { month: 4, sales: 1500, cost: 900 },
    { month: 5, sales: 1800, cost: 1050 },
    { month: 6, sales: 2100, cost: 1200 }
];

// 2. 数据清洗
const cleanData = salesData.filter(d => d.sales > 0 && d.cost > 0);

// 3. 计算利润
const analysisData = cleanData.map(d => ({
    ...d,
    profit: d.sales - d.cost,
    margin: ((d.sales - d.cost) / d.sales * 100).toFixed(1)
}));

// 4. 汇总统计
const totalSales = analysisData.reduce((s, d) => s + d.sales, 0);
const totalProfit = analysisData.reduce((s, d) => s + d.profit, 0);
console.log("总销售额:", totalSales);
console.log("总利润:", totalProfit);`,
          explanation: "1. 数据准备与清洗；2. 计算利润和利润率；3. 汇总分析得出结论。",
          questions: [
              { text:"数据分析第一步？", options:["问题定义","数据清洗","建模"], correct:0, explanation:"先定义问题再分析。" }
          ]}
    ];

    let currentView = 'list';
    let currentProject = null;
    let currentMode = 'learn';
    let quizState = {};

    function formatTime(sec) { let m=Math.floor(sec/60), s=sec%60; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function stopTimer(id) { if(quizState[id]?.timer) clearInterval(quizState[id].timer); }
    function startTimer(id) { if(!quizState[id] || quizState[id].started) return; stopTimer(id); quizState[id].started=true; quizState[id].timer = setInterval(()=>{ if(quizState[id] && quizState[id].time>0){ quizState[id].time--; let span=document.getElementById(`qt_${id}`); if(span) span.innerText=formatTime(quizState[id].time); if(quizState[id].time===0){ stopTimer(id); alert('时间到！测验结束。'); } } },1000); }

    function renderHome() {

                </div>
                <div class="projects-grid" id="projectsGrid"></div>
                <div class="contact"><div class="contact-links"><a href="https://github.com/lyyy001108"><i class="fab fa-github"></i> lyyy001108</a><a href="mailto:liying@example.com"><i class="fas fa-envelope"></i> liying@example.com</a></div><div><i class="fas fa-heart" style="color:#d48a7a;"></i> 保持好奇 · 用数据探索世界</div></div>
                <footer>© 2025 李颖 · 数据分析实战营 | 第1-10章完整项目</footer>

    function renderDetail(project, idx) {
        currentProject = project;
        currentMode = 'learn';
        const pid = project.id;

        document.getElementById('app').innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> 返回项目列表</button>

                    <div class="sidebar">

        `;
        document.getElementById('backBtn').onclick = renderHome;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {

                renderModeContent();

        });
        document.querySelector('.mode-btn').classList.add('active');
        renderModeContent();

    function renderModeContent() {
        const container = document.getElementById('rightPanel');

                <div class="content-card">
                    <h2>💻 代码练习</h2>

                        <div class="code-header"><span><i class="fas fa-terminal"></i> JavaScript 编辑器</span><div class="code-actions"><button id="runCode">▶ 运行代码</button><button id="copyCode">📋 复制代码</button></div></div>
                        <textarea id="codeArea" rows="15">${currentProject.code}</textarea>
                        <div class="output-area"><strong>📤 运行结果：</strong><pre id="outputResult">点击"运行代码"按钮执行</pre></div>

            document.getElementById('runCode').onclick = () => {

                        console.log = oldLog;
                        if(logs.length) out.innerText = logs.join('\n');
                        else if(result !== undefined) out.innerText = String(result);
                        else out.innerText = '执行完成';
                    } catch(e) { out.innerText = `错误：${e.message}`; }
                }, 50);
            };
            document.getElementById('copyCode').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('codeArea').value);
                alert('✅ 代码已复制');
            };
        } else if(currentMode === 'quiz') {
            const qs = quizState[currentProject.id];
            const questions = currentProject.questions;
            const isFinished = qs.answers.every(a=>a!==null);
            if(!qs.started) {
                container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ 10:00</div><button id="startQuizBtn" style="background:#a8c898; border:none; padding:0.7rem; border-radius:2rem; width:100%; color:white; cursor:pointer; font-size:1rem;">▶ 开始测验（${questions.length}道题）</button><div id="quizContent"></div></div>`;
                document.getElementById('startQuizBtn').onclick = () => { startTimer(currentProject.id); renderModeContent(); };
                return;
            }
            if(isFinished) {
                const correct = qs.answers.filter((a,i)=>a===questions[i].correct).length;

            let expHtml = '';
            if(selected !== undefined){
                const isCorrect = (selected === q.correct);
                expHtml = `<div class="explanation-box"><strong>${isCorrect?'✅ 回答正确！':'❌ 回答错误'}</strong><br>📖 解析：${q.explanation}<br>${!isCorrect?`💡 正确答案：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`:''}</div>`;

            container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ ${formatTime(qs.time)}</div>
                <div class="question-item"><div class="question-text">第 ${qs.idx+1}/${questions.length} 题</div><div class="question-text" style="font-weight:600;">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${expHtml}<div class="quiz-actions"><button id="prevQ">◀ 上一题</button><button id="nextQ">${qs.idx===questions.length-1?'✅ 提交':'下一题 ▶'}</button></div></div></div>`;
            document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderModeContent(); }; });
            document.getElementById('prevQ').onclick = () => { if(qs.idx>0){ qs.idx--; renderModeContent(); } };
            document.getElementById('nextQ').onclick = () => { if(qs.answers[qs.idx]===null){ alert('请先选择答案'); return; } if(qs.idx<questions.length-1){ qs.idx++; renderModeContent(); }else{ stopTimer(currentProject.id); renderModeContent(); } };
        }
    }
    
    renderHome();
</script>
