            gap: 0.5rem;

        }

        .hero .bio {

            font-size: 0.9rem;

            border-radius: 2rem;

            flex-wrap: wrap;
            gap: 1.2rem;
            margin: 2rem 0 2.5rem;
            justify-content: center;
        }

        .stat-card {

        }

        .stat-card:hover {
            transform: translateY(-4px);
            background: #ffffffdd;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #6B9A78, #C28A7A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #AD8A7A;
            margin-top: 0.3rem;
        }

            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            margin: 2rem 0 1.2rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 650;
            color: #568469;
        }

        .courses-grid {
            display: grid;

            gap: 1.8rem;
            margin-bottom: 2rem;
        }

            background: rgba(255, 255, 250, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.3rem;
            transition: all 0.3s ease;
            border: 1px solid #e8e0d4;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            cursor: pointer;
        }

        .course-card:hover {
            transform: translateY(-6px);
            background: white;
            border-color: #E6C8BC;
            box-shadow: 0 18px 28px rgba(100, 70, 60, 0.08);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .course-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #568469;
            margin: 0.3rem 0;
        }

        .course-desc {
            font-size: 0.8rem;
            color: #8DA38E;
            line-height: 1.4;
            margin-bottom: 0.6rem;
        }

        .course-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

            background: #FCE9E0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #C2847A;
            font-weight: 500;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(90, 70, 60, 0.4);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #FFFEF9;
            border-radius: 2rem;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(60, 40, 30, 0.15);
            border: 1px solid #F5E2D8;
            position: relative;
        }

        .modal-close {
            position: sticky;
            top: 0;
            left: 100%;
            width: 30px;
            height: 30px;
            background: #EED9CE;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            float: right;
            margin: -0.5rem -0.5rem 0 0;
            transition: 0.2s;
        }

        .modal-close:hover {
            background: #D6B8AA;
            transform: rotate(90deg);
        }

        .modal-icon {
            font-size: 2rem;
            margin-bottom: 0.2rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #568469;
            margin-bottom: 0.3rem;

            background: #FDF8F3;
            border-radius: 1.2rem;
            margin: 0.8rem 0;
            border: 1px solid #F0E0D4;
            overflow: hidden;
        }

        .collapsible-header {
            background: #F7EFE8;
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #6F8F72;
            transition: 0.2s;
        }

        .collapsible-header i {
            transition: transform 0.2s;
        }

        .collapsible-header.active i {
            transform: rotate(180deg);
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: white;
            padding: 0 1.2rem;
        }

            padding: 1rem 1.2rem;
        }

            padding-left: 0.2rem;

            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;

            margin: 0.8rem 0;

            border-color: #9DC28E;
        }

            gap: 0.8rem;
            margin-top: 1rem;

            border-radius: 2rem;

            cursor: pointer;
            font-size: 0.8rem;

        }
    </style>
</head>

    // 渲染课程卡片
    function buildCards() {
        const grid = document.getElementById('coursesGrid');
        if (!grid) return;
        grid.innerHTML = '';
        coursesData.forEach(course => {
            const card = document.createElement('div');
            card.className = 'course-card';
            card.setAttribute('data-id', course.id);
            card.innerHTML = `
                <div class="card-icon">${course.icon}</div>
                <div class="course-name">${course.name}</div>
                <div class="course-desc">${course.shortDesc}</div>
                <div class="course-tags">${course.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            `;
            card.addEventListener('click', () => openCourseModal(course));
            grid.appendChild(card);
        });
    }

    // ---------- 弹窗 + 测验计时逻辑 ----------
    let activeCourse = null;
    let quizAnswers = [];       // 存储当前课程的用户答案 (每道题选择的索引)
    let quizTimerInterval = null;
    let timeSeconds = 15 * 60; // 15分钟
    let quizStarted = false;

    function stopTimer() {
        if (quizTimerInterval) {
            clearInterval(quizTimerInterval);
            quizTimerInterval = null;
        }
    }

    function startTimer() {
        if (quizTimerInterval) stopTimer();
        quizTimerInterval = setInterval(() => {
            if (timeSeconds > 0) {
                timeSeconds--;
                updateTimerDisplay();
                if (timeSeconds === 0) {
                    stopTimer();
                    alert('时间到！测验将自动结束。');
                    submitQuizAndShowResult();
                }
            } else {
                stopTimer();
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const timerSpan = document.getElementById('globalTimer');
        if (timerSpan) {
            const mins = Math.floor(timeSeconds / 60);
            const secs = timeSeconds % 60;
            timerSpan.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
    }

    // 渲染测验当前题目
    let currentQIndex = 0;
    function renderCurrentQuestion() {
        const container = document.getElementById('quizInnerContainer');
        if (!container || !activeCourse) return;
        const questions = activeCourse.questions;
        if (currentQIndex >= questions.length) {
            submitQuizAndShowResult();
            return;
        }
        const q = questions[currentQIndex];
        const selectedIdx = quizAnswers[currentQIndex];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedIdx === idx);
            optionsHtml += `<div class="option ${isSelected ? 'selected' : ''}" data-opt-idx="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`;
        });
        container.innerHTML = `
            <div class="question-text">第 ${currentQIndex+1} / ${questions.length} 题</div>
            <div class="question-text">${q.text}</div>
            <div class="options" id="dynamicOptions">${optionsHtml}</div>
            <div class="quiz-actions">
                <button id="prevQuizBtn" ${currentQIndex === 0 ? 'disabled' : ''}>上一题</button>
                <button id="nextQuizBtn">${currentQIndex === questions.length-1 ? '提交测验' : '下一题'}</button>
            </div>
        `;
        // 绑定选项点击
        document.querySelectorAll('#dynamicOptions .option').forEach(optDiv => {
            optDiv.addEventListener('click', (e) => {
                const selectedVal = parseInt(optDiv.getAttribute('data-opt-idx'));
                quizAnswers[currentQIndex] = selectedVal;
                renderCurrentQuestion();
            });
        });
        const prevBtn = document.getElementById('prevQuizBtn');
        const nextBtn = document.getElementById('nextQuizBtn');
        if (prevBtn) prevBtn.addEventListener('click', () => {
            if (currentQIndex > 0) {
                currentQIndex--;
                renderCurrentQuestion();
            }
        });
        if (nextBtn) nextBtn.addEventListener('click', () => {
            if (currentQIndex < questions.length - 1) {
                currentQIndex++;
                renderCurrentQuestion();
            } else {
                // 最后一道题 点“提交测验”
                if (quizAnswers[currentQIndex] === undefined) {
                    alert('请完成当前题目再提交');
                    return;
                }
                submitQuizAndShowResult();
            }
        });
    }

    function submitQuizAndShowResult() {
        stopTimer();
        const questions = activeCourse.questions;
        let correctCount = 0;
        for (let i = 0; i < questions.length; i++) {
            if (quizAnswers[i] === questions[i].correct) correctCount++;
        }
        const resultDiv = document.getElementById('quizInnerContainer');
        if (resultDiv) {
            resultDiv.innerHTML = `
                <div class="quiz-result">
                    <div>🎉 得分：${correctCount} / ${questions.length}</div>
                    <div>${correctCount === questions.length ? '太棒了！完全掌握✨' : '再复习一下，会变得更强 📚'}</div>
                    <button id="restartQuizBtn" style="margin-top:12px; background:#CBB49B; border:none; padding:0.3rem 1rem; border-radius:2rem; cursor:pointer;">重新测验</button>
                </div>
            `;
            const restartBtn = document.getElementById('restartQuizBtn');
            if (restartBtn) {
                restartBtn.addEventListener('click', () => {
                    // 重置该课程测验
                    resetQuizForCurrentCourse();
                });
            }
        }
    }

    function resetQuizForCurrentCourse() {
        stopTimer();
        quizAnswers = new Array(activeCourse.questions.length).fill(undefined);
        currentQIndex = 0;
        timeSeconds = 15 * 60;
        quizStarted = false;
        updateTimerDisplay();
        renderCurrentQuestion();
        startTimer();
        quizStarted = true;
    }

    // 打开弹窗，填入学习目标/资源 + 测验模块
    function openCourseModal(course) {
        activeCourse = course;
        // 重置测验数据
        quizAnswers = new Array(course.questions.length).fill(undefined);
        currentQIndex = 0;
        timeSeconds = 15 * 60;
        quizStarted = false;
        stopTimer();

        const modal = document.getElementById('courseModal');
        const dynamicContainer = document.getElementById('modalDynamicContent');
        // 构建学习目标 和 学习资源 的可折叠区块
        const goalsHtml = course.goals.map(g => `<li><i class="fas fa-check-circle" style="color:#8DB38E;"></i> ${g}</li>`).join('');
        const resourcesHtml = course.resources.map(r => `<li><i class="fas fa-link" style="color:#CA9A8A;"></i> <a href="${r.url}" target="_blank">${r.name}</a></li>`).join('');

        dynamicContainer.innerHTML = `
            <div class="modal-icon">${course.icon}</div>
            <div class="modal-title">${course.name}</div>
            <div style="margin-bottom: 0.8rem; font-size:0.85rem; color:#A28B7A;">${course.shortDesc}</div>
            
            <div class="collapsible" id="goalsCollapse">
                <div class="collapsible-header">
                    <span>📌 学习目标</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="collapsible-content">
                    <ul class="goal-list">${goalsHtml}</ul>
                </div>
            </div>
            
            <div class="collapsible" id="resourceCollapse">
                <div class="collapsible-header">
                    <span>📚 学习资源</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="collapsible-content">
                    <ul class="resource-list">${resourcesHtml}</ul>
                </div>
            </div>
            
            <div class="quiz-area">
                <div class="quiz-header">
                    <span><i class="fas fa-puzzle-piece"></i> <strong>单元测验 · 共${course.questions.length}题</strong></span>
                    <span class="timer" id="globalTimer">15:00</span>
                </div>
                <div id="quizInnerContainer"></div>
            </div>
        `;

        // 绑定折叠事件
        document.querySelectorAll('.collapsible-header').forEach(header => {
            header.removeEventListener('click', toggleCollapse);
            header.addEventListener('click', toggleCollapse);
        });

        function toggleCollapse(e) {
            const header = e.currentTarget;
            const contentDiv = header.parentElement.querySelector('.collapsible-content');
            header.classList.toggle('active');
            contentDiv.classList.toggle('active');
        }

        modal.style.display = 'flex';
        // 开始渲染测验题目并启动计时器（用户展开测验后再开始启动）
        renderCurrentQuestion();
        startTimer();
        quizStarted = true;
    }

    // 关闭弹窗
    function closeModal() {
