<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李颖 · 数据分析实战营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0f0e5 0%, #fdf0ea 100%);
            color: #2c4a3a;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* 头部 - 保留学校信息 */
        .hero {
            background: rgba(255,252,245,0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(160,190,140,0.3);
        }
        .hero h1 { font-size: 2rem; font-weight: 700; color: #4a7a5e; margin-bottom: 0.3rem; }
        .hero h2 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, #3a7b54, #c2857b); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .hero .school { font-size: 0.9rem; color: #8aae8a; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .hero .school i { color: #c28a7a; }
        
        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .project-card {
            background: rgba(255,255,250,0.85);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            transition: all 0.3s;
            border: 1px solid #ece0d6;
            cursor: pointer;
        }
        .project-card:hover { transform: translateY(-5px); background: white; box-shadow: 0 15px 25px rgba(0,0,0,0.08); }
        .project-number { font-size: 0.8rem; color: #c28a7a; margin-bottom: 0.3rem; font-weight: 500; }
        .project-name { font-size: 1.2rem; font-weight: 700; color: #4a7a5e; margin-bottom: 0.3rem; }
        .project-desc { font-size: 0.8rem; color: #8a9e8a; }
        .project-meta { display: flex; gap: 0.8rem; margin-top: 0.5rem; font-size: 0.7rem; color: #b0a090; }
        
        /* 详情页布局 */
        .back-btn {
            background: #d4c0b0;
            border: none; padding: 0.5rem 1.2rem; border-radius: 2rem;
            color: white; cursor: pointer; margin-bottom: 1.5rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .detail-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        /* 左侧目录 */
        .sidebar {
            flex: 1; min-width: 240px;
            background: rgba(255,252,245,0.8);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            position: sticky; top: 1rem;
            height: fit-content;
        }
        .sidebar h3 { color: #4a7a5e; margin-bottom: 1rem; font-size: 1.1rem; }
        .mode-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .mode-btn {
            padding: 0.8rem 1rem;
            background: rgba(250,240,230,0.6);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            text-align: center;
        }
        .mode-btn:hover { background: #f0e0d4; }
        .mode-btn.active { background: #dbbcac; color: white; }
        
        /* 右侧内容区 */
        .right-panel {
            flex: 2.5; min-width: 500px;
        }
        .content-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .content-card h2 { color: #4a7a5e; margin-bottom: 0.5rem; font-size: 1.3rem; }
        .content-card h3 { color: #c28a7a; margin: 1rem 0 0.5rem; font-size: 1.1rem; }
        .content-card p { color: #5a6e5a; line-height: 1.6; margin-bottom: 0.8rem; }
        .content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 0.8rem; color: #5a6e5a; }
        .content-card li { margin: 0.3rem 0; }
        
        /* 代码编辑器 */
        .code-editor {
            background: #1e2a2a;
            border-radius: 1rem;
            margin: 1rem 0;
            overflow: hidden;
        }
        .code-header {
            background: #2a3a3a;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .code-header span { color: #8ba18e; font-size: 0.75rem; }
        .code-actions button {
            background: #dbbcac; border: none; padding: 0.2rem 0.8rem;
            border-radius: 1rem; color: white; cursor: pointer; font-size: 0.7rem;
        }
        textarea {
            width: 100%; background: #1e2a2a; color: #e0e0d0;
            font-family: monospace; font-size: 0.8rem; padding: 1rem;
            border: none; outline: none; resize: vertical;
        }
        .output-area {
            background: #2a3a3a; padding: 0.8rem; border-radius: 0.8rem;
            margin-top: 0.5rem;
        }
        .output-area pre { color: #e0e0d0; font-family: monospace; font-size: 0.75rem; white-space: pre-wrap; }
        
        /* 测验区域 */
        .quiz-area {
            background: #fefaf5;
            border-radius: 1.2rem;
            padding: 1.2rem;
            border: 1px solid #f0e0d4;
        }
        .timer {
            background: #fceae3; padding: 0.3rem 0.8rem; border-radius: 2rem;
            font-size: 0.8rem; font-weight: bold; color: #c28a7a; display: inline-block;
            margin-bottom: 1rem;
        }
        .question-item { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .options { display: flex; flex-direction: column; gap: 0.6rem; margin: 0.8rem 0; }
        .option {
            background: #fef5f0; padding: 0.5rem 1rem; border-radius: 2rem;
            cursor: pointer; font-size: 0.85rem; border: 1px solid #f0e0d4;
            transition: all 0.15s;
        }
        .option:hover { background: #ffede3; transform: translateX(4px); }
        .option.selected { background: #dbbcac; color: white; }
        .explanation-box { background: #e8f0e4; border-radius: 1rem; padding: 0.8rem; margin: 0.8rem 0; border-left: 4px solid #7CBA96; }
        .quiz-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .quiz-actions button { background: #d4c0b0; border: none; padding: 0.4rem 1rem; border-radius: 2rem; color: white; cursor: pointer; }
        .quiz-result { background: #e0f0e4; padding: 1rem; border-radius: 1rem; text-align: center; }
        
        .contact { background: rgba(255,250,240,0.7); border-radius: 2rem; padding: 1rem 2rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-top: 2rem; }
        .contact-links { display: flex; gap: 1.5rem; }
        .contact-links a { color: #9a8a7a; text-decoration: none; }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #b1a99a; }
        
        @media (max-width: 900px) { .detail-layout { flex-direction: column; } .sidebar { position: static; } .right-panel { min-width: auto; } }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== 10个项目数据 ====================
    const projects = [
        { id:1, name:"数据清洗实战", duration:"30分钟", level:"入门",
          learn:`<h3>🎯 项目目标</h3><p>掌握Pandas数据清洗的核心技能，包括处理缺失值、重复值、异常值等关键步骤。</p><h3>📌 什么是数据清洗？</h3><p>数据清洗是数据分析的第一步，通常占整个分析过程的60-80%时间。现实数据往往是不完整的、有噪声的、不一致的。</p><h3>🔧 9步完整数据清洗流程</h3><ol><li>处理重复值</li><li>处理缺失值</li><li>处理异常值</li><li>格式统一</li><li>数据类型转换</li><li>列名标准化</li><li>值映射</li><li>数据验证</li><li>记录清洗过程</li></ol>`,
          code: `import pandas as pd\nimport numpy as np\n\n# 创建示例数据\ndata = {\n    '姓名': ['张三', '李四', '王五', '张三', None, '赵六'],\n    '年龄': [25, None, 30, 25, 22, 35],\n    '工资': [5000, 6000, 5500, 5000, 4800, None],\n    '部门': ['销售', '技术', '销售', '销售', '技术', '行政']\n}\ndf = pd.DataFrame(data)\n\nprint("原始数据：")\nprint(df)\n\nprint("\\n1. 检测重复值：", df.duplicated().sum())\ndf = df.drop_duplicates()\n\nprint("\\n2. 检测缺失值：")
print(df.isnull().sum())\n\ndf['年龄'] = df['年龄'].fillna(df['年龄'].median())\ndf['工资'] = df['工资'].fillna(df['工资'].mean())\n\nprint("\\n3. 清洗后数据：")
print(df)`,
          explanation: "1. duplicated()检测重复行；2. drop_duplicates()删除重复；3. isnull().sum()统计缺失；4. fillna()填充缺失值，年龄用中位数，工资用均值。",
          questions:[
              { text:"Pandas中检测缺失值的函数是？", options:["isnull()","dropna()","fillna()"], correct:0, explanation:"isnull()返回布尔型DataFrame标记缺失值位置。" },
              { text:"删除重复行的函数是？", options:["drop_duplicates()","duplicated()","unique()"], correct:0, explanation:"drop_duplicates()删除重复行。" },
              { text:"以下哪个是数据清洗的步骤？", options:["去重","建模","可视化"], correct:0, explanation:"去重是清洗步骤，建模是后续分析。" }
          ]},
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门",
          learn:`<h3>🎯 项目目标</h3><p>掌握描述性统计分析方法，理解数据分布特征和变量间关系。</p><h3>📊 描述性统计指标</h3><ul><li>均值：平均数</li><li>中位数：中间值</li><li>标准差：离散程度</li><li>四分位数：数据分布</li></ul><h3>📈 相关性分析</h3><p>相关系数r范围-1到1，>0正相关，<0负相关，|r|>0.8强相关。</p>`,
          code: `import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndata = {'产品': ['A','B','C']*3, '销售额': np.random.randint(100,500,9), '销量': np.random.randint(10,100,9)}\ndf = pd.DataFrame(data)\n\nprint("描述性统计：")
print(df[['销售额','销量']].describe())\n\nprint("\\n按产品分组统计：")
print(df.groupby('产品')['销售额'].agg(['sum','mean']))\n\nprint("\\n相关性：", df['销售额'].corr(df['销量']))`,
          explanation: "1. describe()输出统计指标；2. groupby分组聚合；3. corr()计算相关系数。",
          questions:[
              { text:"描述性统计不包括以下哪个？", options:["均值","中位数","聚类"], correct:2, explanation:"聚类是机器学习算法。" }
          ]},
        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶",
          learn:`<h3>🎯 项目目标</h3><p>学习关联规则挖掘，发现商品购买关联。</p><h3>📖 核心概念</h3><ul><li>支持度：商品出现的概率</li><li>置信度：条件概率</li><li>提升度：关联强度</li></ul>`,
          code: `import pandas as pd\nfrom mlxtend.frequent_patterns import apriori, association_rules\n\ndata = {'订单号':[1,1,2,2,2,3,3], '商品':['牛奶','面包','牛奶','尿布','啤酒','面包','尿布']}\ndf = pd.DataFrame(data)\n\nbasket = df.groupby(['订单号','商品'])['商品'].count().unstack().fillna(0)\nbasket = basket.applymap(lambda x:1 if x>0 else 0)\n\nfrequent = apriori(basket, min_support=0.4, use_colnames=True)\nrules = association_rules(frequent, metric="confidence", min_threshold=0.6)\nprint("频繁项集：", frequent)\nprint("关联规则：", rules[['antecedents','consequents','lift']] if len(rules)>0 else "无规则")`,
          explanation: "1. 转换购物篮矩阵；2. apriori挖掘频繁项集；3. association_rules生成规则。",
          questions:[{ text:"提升度>1表示什么？", options:["正相关","负相关","独立"], correct:0, explanation:"提升度>1表示购买X会促进购买Y。" }]},
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶",
          learn:`<h3>🎯 项目目标</h3><p>学习KMeans聚类算法，实现客户分群。</p><h3>📖 算法原理</h3><p>将数据分为K个簇，簇内点距离近，簇间点距离远。</p>`,
          code: `from sklearn.cluster import KMeans\nfrom sklearn.preprocessing import StandardScaler\nimport numpy as np\n\nX = np.array([[1,2],[1,4],[1,0],[10,2],[10,4],[10,0]])\nscaler = StandardScaler()\nX_scaled = scaler.fit_transform(X)\n\nkmeans = KMeans(n_clusters=2, random_state=42)\nlabels = kmeans.fit_predict(X_scaled)\nprint("聚类结果：", labels)`,
          explanation: "1. 标准化数据；2. KMeans聚类；3. fit_predict预测标签。",
          questions:[{ text:"KMeans属于什么学习？", options:["监督学习","无监督学习","强化学习"], correct:1, explanation:"KMeans不需要标签，是无监督学习。" }]},
        { id:5, name:"RFM模型用户分层", duration:"45分钟", level:"进阶",
          learn:`<h3>🎯 项目目标</h3><p>学习RFM模型进行客户价值分层。</p><h3>📖 RFM指标</h3><ul><li>R：最近消费时间</li><li>F：消费频率</li><li>M：消费金额</li></ul>`,
          code: `import pandas as pd\n\ndata = {'客户':[1,2,3], 'R':[5,30,90], 'F':[10,3,1], 'M':[5000,800,100]}\ndf = pd.DataFrame(data)\n\ndf['R_score'] = pd.qcut(df['R'], 3, labels=[3,2,1])\ndf['F_score'] = pd.qcut(df['F'], 3, labels=[1,2,3])\ndf['M_score'] = pd.qcut(df['M'], 3, labels=[1,2,3])\nprint(df)`,
          explanation: "1. 计算RFM值；2. qcut分箱评分；3. 综合评分分层。",
          questions:[{ text:"RFM中R代表什么？", options:["最近消费时间","消费频率","消费金额"], correct:0, explanation:"R是Recency的缩写。" }]},
        { id:6, name:"线性回归分析", duration:"45分钟", level:"进阶",
          learn:`<h3>🎯 项目目标</h3><p>学习线性回归预测连续变量。</p><h3>📈 模型原理</h3><p>y = β₀ + β₁x₁ + ... + βₙxₙ，最小二乘法估计参数。</p>`,
          code: `from sklearn.linear_model import LinearRegression\nimport numpy as np\n\nX = np.array([[1],[2],[3],[4],[5]])\ny = np.array([2,4,6,8,10])\n\nmodel = LinearRegression()\nmodel.fit(X, y)\nprint(f"系数: {model.coef_[0]:.2f}, 截距: {model.intercept_:.2f}")\nprint(f"预测X=6: {model.predict([[6]])[0]:.2f}")`,
          explanation: "1. 创建数据；2. LinearRegression训练；3. predict预测。",
          questions:[{ text:"线性回归适合预测什么类型？", options:["连续值","类别值","序列值"], correct:0, explanation:"线性回归预测连续数值。" }]},
        { id:7, name:"随机森林预测", duration:"60分钟", level:"高级",
          learn:`<h3>🎯 项目目标</h3><p>学习随机森林集成算法进行预测。</p><h3>🌲 算法原理</h3><p>构建多棵决策树，取平均预测，抗过拟合能力强。</p>`,
          code: `from sklearn.ensemble import RandomForestRegressor\nimport numpy as np\n\nX = np.random.rand(100, 2)\ny = X[:,0] * 3 + X[:,1] * 2 + np.random.randn(100)*0.1\n\nrf = RandomForestRegressor(n_estimators=10, random_state=42)\nrf.fit(X, y)\nprint(f"R²得分: {rf.score(X, y):.3f}")`,
          explanation: "1. 生成数据；2. 随机森林训练；3. 评估R²。",
          questions:[{ text:"随机森林是什么类型算法？", options:["集成学习","聚类","关联规则"], correct:0, explanation:"随机森林是多决策树的集成。" }]},
        { id:8, name:"时间序列分析", duration:"45分钟", level:"高级",
          learn:`<h3>🎯 项目目标</h3><p>学习时间序列分析和预测。</p><h3>⏰ 常用方法</h3><ul><li>移动平均</li><li>指数平滑</li><li>ARIMA模型</li></ul>`,
          code: `import pandas as pd\n\nsales = [100,110,105,120,115,130,125,140]\ndf = pd.DataFrame({'销量': sales})\ndf['MA3'] = df['销量'].rolling(window=3).mean()\nprint("原始销量：", df['销量'].tolist())\nprint("3期移动平均：", df['MA3'].tolist())`,
          explanation: "1. 创建时间序列；2. rolling计算移动平均；3. 预测趋势。",
          questions:[{ text:"移动平均的作用是？", options:["平滑数据","增加噪声","分类"], correct:0, explanation:"移动平均平滑短期波动。" }]},
        { id:9, name:"异常检测", duration:"45分钟", level:"高级",
          learn:`<h3>🎯 项目目标</h3><p>学习识别数据中的异常值。</p><h3>📊 常用方法</h3><ul><li>Z-score法（正态分布）</li><li>IQR法（箱线图）</li><li>孤立森林</li></ul>`,
          code: `import numpy as np\nfrom scipy import stats\n\ndata = [10,12,13,12,11,14,13,100,12,11]\nz_scores = np.abs(stats.zscore(data))\noutliers = [data[i] for i, z in enumerate(z_scores) if z > 2]\nprint(f"数据: {data}")\nprint(f"异常值(Z>2): {outliers}")`,
          explanation: "1. 计算Z-score；2. 判断阈值；3. 识别异常点。",
          questions:[{ text:"IQR法中的IQR是什么？", options:["四分位距","标准差","均值"], correct:0, explanation:"IQR = Q3 - Q1。" }]},
        { id:10, name:"全流程综合项目", duration:"60分钟", level:"高级",
          learn:`<h3>🎯 项目目标</h3><p>综合运用所学技能完成完整商业分析流程。</p><h3>📋 分析流程</h3><ol><li>问题定义</li><li>数据采集</li><li>数据清洗</li><li>分析与建模</li><li>可视化</li><li>报告输出</li></ol>`,
          code: `import pandas as pd\nimport numpy as np\n\nnp.random.seed(42)\ndata = {'月份': range(1,13), '销售额': np.random.randint(1000,5000,12)}\ndf = pd.DataFrame(data)\n\nprint("=== 月度销售分析 ===\n", df)\nprint(f"\\n总销售额: {df['销售额'].sum():,}")\nprint(f"平均销售额: {df['销售额'].mean():.0f}")\nprint(f"最高月: {df.loc[df['销售额'].idxmax(), '月份']}月")
print("\\n结论: 建议旺季前增加库存，淡季促销清仓。")`,
          explanation: "1. 创建销售数据；2. 计算关键指标；3. 输出分析结论。",
          questions:[{ text:"数据分析最后一步通常是？", options:["数据清洗","可视化报告","模型训练"], correct:1, explanation:"分析结果需要可视化报告呈现。" }]}
    ];

    let currentView = 'list';
    let currentProject = null;
    let currentMode = 'learn';
    let quizState = {};

    function formatTime(sec) { let m=Math.floor(sec/60), s=sec%60; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function stopTimer(id) { if(quizState[id]?.timer) clearInterval(quizState[id].timer); }
    function startTimer(id) { if(!quizState[id] || quizState[id].started) return; stopTimer(id); quizState[id].started=true; quizState[id].timer = setInterval(()=>{ if(quizState[id] && quizState[id].time>0){ quizState[id].time--; let span=document.getElementById(`qt_${id}`); if(span) span.innerText=formatTime(quizState[id].time); if(quizState[id].time===0){ stopTimer(id); alert('时间到！测验结束。'); } } },1000); }

    function renderHome() {
        currentView='list';
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="hero">
                    <h1>🌸 欢迎来到李颖的学习空间</h1>
                    <h2>📊 数据分析技术</h2>
                    <div class="school"><i class="fas fa-graduation-cap"></i> 广东科学技术职业学院 · 商学院 · 商务数据分析与应用专业大二学生</div>
                </div>
                <div class="projects-grid" id="projectsGrid"></div>
                <div class="contact"><div class="contact-links"><a href="https://github.com/lyyy001108"><i class="fab fa-github"></i> lyyy001108</a><a href="mailto:liying@example.com"><i class="fas fa-envelope"></i> liying@example.com</a></div><div><i class="fas fa-heart"></i> 保持好奇 · 用数据探索世界</div></div>
                <footer>© 2025 李颖 · 数据分析实战营 | 第1-10章完整项目</footer>
            </div>
        `;
        let grid = document.getElementById('projectsGrid');
        projects.forEach((p, idx) => {
            let card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `<div class="project-number">第${idx+1}章</div><div class="project-name">${p.name}</div><div class="project-desc">${p.duration} · ${p.level}</div><div class="project-meta"><span><i class="far fa-clock"></i> ${p.duration}</span><span><i class="fas fa-chart-line"></i> ${p.level}</span></div>`;
            card.onclick = () => renderDetail(p, idx);
            grid.appendChild(card);
        });
    }

    function renderDetail(project, idx) {
        currentProject = project;
        currentMode = 'learn';
        const pid = project.id;
        if(!quizState[pid]) quizState[pid] = { answers: new Array(project.questions.length).fill(null), idx:0, time:10*60, timer:null, started:false, showExplanation:false };
        
        document.getElementById('app').innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> 返回项目列表</button>
                <div class="detail-layout">
                    <div class="sidebar">
                        <h3>📖 第${idx+1}章 · ${project.name}</h3>
                        <div class="mode-list">
                            <div class="mode-btn" data-mode="learn">📚 学 · 课程学习</div>
                            <div class="mode-btn" data-mode="practice">💻 练 · 代码练习</div>
                            <div class="mode-btn" data-mode="quiz">📝 考 · 课程测验</div>
                        </div>
                    </div>
                    <div class="right-panel" id="rightPanel"></div>
                </div>
                <footer>© 2025 李颖 · 数据分析实战营</footer>
            </div>
        `;
        
        document.getElementById('backBtn').onclick = renderHome;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.getAttribute('data-mode');
                renderModeContent();
            };
        });
        document.querySelector('.mode-btn').classList.add('active');
        renderModeContent();
    }
    
    function renderModeContent() {
        const container = document.getElementById('rightPanel');
        if(!container) return;
        if(currentMode === 'learn') {
            container.innerHTML = `<div class="content-card">${currentProject.learn}</div>`;
        } else if(currentMode === 'practice') {
            container.innerHTML = `
                <div class="content-card">
                    <h2>💻 代码练习</h2>
                    <p>尝试运行下面的代码，修改参数观察结果变化：</p>
                    <div class="code-editor">
                        <div class="code-header"><span><i class="fas fa-terminal"></i> Python编辑器</span><div class="code-actions"><button id="runCode">▶ 运行代码</button><button id="copyCode">📋 复制代码</button></div></div>
                        <textarea id="codeArea" rows="12">${currentProject.code}</textarea>
                        <div class="output-area"><strong>📤 运行结果：</strong><pre id="outputResult">点击"运行代码"按钮执行</pre></div>
                    </div>
                    <div style="background:#e8f0e4; padding:1rem; border-radius:1rem; margin-top:1rem;">
                        <strong>💡 代码解析</strong><br>${currentProject.explanation}
                    </div>
                </div>
            `;
            document.getElementById('runCode').onclick = () => {
                let code = document.getElementById('codeArea').value;
                let out = document.getElementById('outputResult');
                out.innerText = '运行中...\n';
                setTimeout(() => {
                    try {
                        let logs = [];
                        const oldLog = console.log;
                        console.log = (...args) => { logs.push(args.join(' ')); };
                        const result = eval(code);
                        console.log = oldLog;
                        if(logs.length) out.innerText = logs.join('\n');
                        else if(result !== undefined) out.innerText = String(result);
                        else out.innerText = '执行完成（无输出）';
                    } catch(e) { out.innerText = `错误：${e.message}`; }
                }, 50);
            };
            document.getElementById('copyCode').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('codeArea').value);
                alert('✅ 代码已复制');
            };
        } else if(currentMode === 'quiz') {
            const qs = quizState[currentProject.id];
            const questions = currentProject.questions;
            const isFinished = qs.answers.every(a=>a!==null);
            if(!qs.started) {
                container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ 10:00</div><button id="startQuizBtn" style="background:#7CBA96; border:none; padding:0.6rem; border-radius:2rem; width:100%; color:white; cursor:pointer;">▶ 开始测验（${questions.length}道题）</button><div id="quizContent"></div></div>`;
                document.getElementById('startQuizBtn').onclick = () => { startTimer(currentProject.id); renderModeContent(); };
                return;
            }
            if(isFinished) {
                const correct = qs.answers.filter((a,i)=>a===questions[i].correct).length;
                container.innerHTML = `<div class="quiz-area"><div class="quiz-result">得分：${correct}/${questions.length}<br>${correct===questions.length?'🎉 完美通关！':'📚 继续努力！'}<button id="resetQuiz" style="background:#dbbcac; border:none; padding:0.4rem 1rem; border-radius:2rem; margin-top:0.8rem;">重新测验</button></div></div>`;
                document.getElementById('resetQuiz')?.addEventListener('click',()=>{ stopTimer(currentProject.id); quizState[currentProject.id]={ answers:new Array(questions.length).fill(null), idx:0, time:10*60, timer:null, started:false, showExplanation:false }; renderModeContent(); });
                return;
            }
            const q = questions[qs.idx];
            const selected = qs.answers[qs.idx];
            let expHtml = '';
            if(qs.showExplanation && selected!==undefined){
                const isCorrect = (selected === q.correct);
                expHtml = `<div class="explanation-box"><strong>${isCorrect?'✅ 回答正确！':'❌ 回答错误'}</strong><br>📖 ${q.explanation}<br>${!isCorrect?`💡 正确答案：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`:''}</div>`;
            }
            container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ ${formatTime(qs.time)}</div>
                <div class="question-item"><div>第 ${qs.idx+1}/${questions.length} 题</div><div style="margin:0.6rem 0">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${expHtml}<div class="quiz-actions"><button id="prevQ">◀ 上一题</button><button id="checkAns">🔍 查看解析</button><button id="nextQ">${qs.idx===questions.length-1?'✅ 提交':'下一题 ▶'}</button></div></div></div>`;
            document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderModeContent(); }; });
            document.getElementById('prevQ').onclick = () => { if(qs.idx>0){ qs.idx--; qs.showExplanation=false; renderModeContent(); } };
            document.getElementById('checkAns').onclick = () => { if(qs.answers[qs.idx]!==undefined){ qs.showExplanation=true; renderModeContent(); }else{ alert('请先选择答案'); } };
            document.getElementById('nextQ').onclick = () => { if(qs.answers[qs.idx]===null){ alert('请先选择答案'); return; } if(qs.idx<questions.length-1){ qs.idx++; qs.showExplanation=false; renderModeContent(); }else{ stopTimer(currentProject.id); renderModeContent(); } };
        }
    }
    
    renderHome();
</script>
</body>
</html>
