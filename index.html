<h3>🎯 项目目标</h3>
<p>掌握Pandas数据清洗的核心技能，包括处理缺失值、重复值、异常值等关键步骤。数据清洗是数据分析的第一步，通常占整个分析过程的60-80%时间，是保证分析质量的基础。</p>

<h3>📌 什么是数据清洗？</h3>
<p>数据清洗（Data Cleaning）是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。现实数据往往是不完整的（缺少属性值）、有噪声的（包含错误值）、不一致的（命名或代码不一致）。</p>

<h3>🔧 为什么需要数据清洗？</h3>
<ul>
<li><strong>提高数据质量</strong>：错误数据会导致错误的分析结论</li>
<li><strong>保证分析准确性</strong>：清洗后的数据才能反映真实情况</li>
<li><strong>提升模型性能</strong>：机器学习模型对数据质量非常敏感</li>
<li><strong>避免"垃圾进垃圾出"</strong>：输入质量决定输出质量</li>
</ul>

<h3>📖 9步完整数据清洗流程</h3>
<ol>
<li><strong>处理重复值</strong>：删除完全相同的行，避免重复统计</li>
<li><strong>处理缺失值</strong>：填充或删除空值，常用中位数、均值填充</li>
<li><strong>处理异常值</strong>：识别并处理超出合理范围的数据</li>
<li><strong>格式统一</strong>：统一日期格式、字符串大小写等</li>
<li><strong>数据类型转换</strong>：确保每列数据是正确类型</li>
<li><strong>列名标准化</strong>：统一命名规范，便于理解</li>
<li><strong>值映射</strong>：将编码值转换为可读标签</li>
<li><strong>数据验证</strong>：检查清洗后的数据是否符合业务规则</li>
<li><strong>记录清洗过程</strong>：便于复现和审计</li>
</ol>

<h3>💡 小贴士</h3>
<p>不要过度清洗！删除太多数据可能会丢失重要信息。清洗前先备份原始数据，每次操作后检查数据量变化。建议使用Jupyter Notebook分段执行，便于调试和记录。</p>`,
          code: `import pandas as pd
import numpy as np

# 创建示例数据
data = {

          explanation: "1. 创建包含缺失值和重复值的测试数据；2. duplicated()检测重复行，drop_duplicates()删除；3. isnull().sum()统计每列缺失数量；4. fillna()填充缺失值，年龄用中位数，工资用均值；5. dtypes检查数据类型是否正确。" },
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门", dataset:"retail_orders.csv",
          learn:`
<h3>🎯 项目目标</h3>
<p>掌握描述性统计分析方法，学会计算均值、中位数、标准差等统计指标，理解数据分布特征和变量间关系。统计分析是数据分析的核心基础，帮助我们从数据中提取有意义的信息。</p>

<h3>📊 描述性统计指标</h3>
<ul>
<li><strong>均值(Mean)</strong>：所有值的平均数，反映数据的集中趋势，但对异常值敏感</li>
<li><strong>中位数(Median)</strong>：排序后的中间值，不受异常值影响，更能反映典型水平</li>
<li><strong>众数(Mode)</strong>：出现频率最高的值，适合分类数据</li>
<li><strong>标准差(Std)</strong>：衡量数据离散程度，越大表示数据越分散</li>
<li><strong>四分位数(Quartile)</strong>：将数据分为四等分，Q1(25%)、Q2(50%)、Q3(75%)</li>
<li><strong>偏度(Skewness)</strong>：分布对称性，正偏表示右尾长，负偏表示左尾长</li>
<li><strong>峰度(Kurtosis)</strong>：分布峰值陡峭程度，正态分布峰度为3</li>
</ul>

<h3>📈 相关性分析</h3>
<p>相关系数(r)衡量两个变量间的线性关系强度，取值范围-1到1：</p>
<ul>
<li>r > 0：正相关，一个变量增大另一个也增大</li>
<li>r < 0：负相关，一个变量增大另一个减小</li>
<li>|r| = 1：完全线性相关</li>
<li>|r| = 0：无线性关系</li>
<li>|r| > 0.8：强相关，0.3-0.8中等相关，<0.3弱相关</li>
</ul>
<p>注意：相关不等于因果，需结合业务逻辑判断。</p>

<h3>📖 分组聚合分析</h3>
<p>分组聚合是将数据按某个维度分组后计算统计量，类似SQL的GROUP BY。常见操作：</p>
<ul>
<li><strong>sum()</strong>：求和</li>
<li><strong>mean()</strong>：平均值</li>
<li><strong>count()</strong>：计数</li>
<li><strong>max()/min()</strong>：最大值/最小值</li>
<li><strong>agg()</strong>：同时应用多个聚合函数</li>
</ul>`,

        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶", dataset:"market_basket.csv",
          learn:`
<h3>🎯 项目目标</h3>
<p>学习关联规则挖掘算法（Apriori），发现商品之间的购买关联，为捆绑销售、商品推荐提供数据支持。例如著名的"啤酒与尿布"案例就是关联规则的典型应用。</p>

<h3>📖 核心概念</h3>
<ul>
<li><strong>支持度(Support)</strong>：包含商品X的交易占总交易的比例。Support(X) = count(X)/总交易数。支持度越高说明商品越热门。</li>
<li><strong>置信度(Confidence)</strong>：购买X的顾客同时购买Y的概率。Confidence(X→Y) = Support(X∪Y)/Support(X)。置信度越高说明关联越强。</li>
<li><strong>提升度(Lift)</strong>：购买X对购买Y的提升作用。Lift(X→Y) = Confidence(X→Y)/Support(Y)。</li>
<li>Lift > 1：正相关，购买X会促进购买Y</li>
<li>Lift < 1：负相关，购买X会抑制购买Y</li>
<li>Lift = 1：独立，X和Y无关联</li>
</ul>

<h3>📈 Apriori算法原理</h3>
<p>Apriori算法基于先验性质：一个项集是频繁的，则它的所有子集也是频繁的。反之，如果一个子集不频繁，则其超集也不频繁。算法步骤：</p>
<ol>
<li>设置最小支持度阈值，找出所有频繁1项集</li>
<li>根据频繁k项集生成候选(k+1)项集</li>
<li>计算候选集的支持度，筛选出频繁(k+1)项集</li>
<li>重复2-3步直到无法生成新的频繁项集</li>
<li>根据最小置信度生成关联规则</li>
</ol>

<h3>💡 业务应用</h3>
<ul>
<li><strong>商品推荐</strong>：购买了A的用户也常买B，可以捆绑推荐</li>
<li><strong>货架摆放</strong>：关联强的商品放在附近，提高交叉销售</li>
<li><strong>促销策略</strong>：对提升度高的商品组合进行联合促销</li>
<li><strong>套餐设计</strong>：组合高频购买的商品形成套餐</li>
</ul>`,
          code: `import pandas as pd
from mlxtend.frequent_patterns import apriori, association_rules

# 创建购物篮数据
data = {
    '订单号': [1,1,2,2,2,3,3,4,4,5],
    '商品': ['牛奶','面包','牛奶','尿布','啤酒','面包','尿布','牛奶','面包','啤酒']
}
df = pd.DataFrame(data)

print("="*50)
print("原始交易数据：")
print(df)

# 转换为购物篮矩阵
basket = df.groupby(['订单号', '商品'])['商品'].count().unstack().fillna(0)
basket = basket.applymap(lambda x: 1 if x > 0 else 0)

print("\\n" + "="*50)
print("购物篮矩阵：")
print(basket)

# 挖掘频繁项集
frequent_items = apriori(basket, min_support=0.4, use_colnames=True)
print("\\n" + "="*50)
print(f"频繁项集（最小支持度40%）：")
print(frequent_items)

# 生成关联规则
rules = association_rules(frequent_items, metric="confidence", min_threshold=0.6)
print("\\n" + "="*50)
print("关联规则：")
if len(rules) > 0:
    print(rules[['antecedents', 'consequents', 'support', 'confidence', 'lift']])
else:
    print("未发现满足条件的关联规则")`,
          explanation: "1. 创建包含5笔订单的交易数据；2. groupby().unstack()转换为商品-订单矩阵；3. applymap将数值转为0/1；4. apriori()挖掘频繁项集，min_support=0.4；5. association_rules()生成规则，min_threshold=0.6；6. 输出规则的 antecedents(前提)、consequents(结果)、support、confidence、lift。" },
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶", dataset:"customer_features.csv",
          learn:`
<h3>🎯 项目目标</h3>
<p>学习KMeans聚类算法，将客户或商品分组，实现精准营销和用户分群。聚类是无监督学习，不需要标签数据，通过数据间的相似度自动分组。</p>

<h3>📖 算法原理</h3>
<p>KMeans算法将数据分为K个簇，簇内点距离近，簇间点距离远。算法步骤：</p>
<ol>
<li>随机选择K个点作为初始质心</li>
<li>计算每个点到各质心的距离，分配到最近的簇</li>
<li>重新计算每个簇的质心（簇内点的均值）</li>

<h3>🎯 项目目标</h3>
<p>学习线性回归模型，预测连续型目标变量，理解变量间线性关系。线性回归是最基础的预测模型，广泛应用于销售预测、价格预测等场景。</p>

<h3>📈 模型原理</h3>
<p>线性回归假设目标变量y与特征x存在线性关系：y = β₀ + β₁x₁ + β₂x₂ + ... + βₙxₙ + ε</p>
<ul>
<li>β₀：截距，当所有特征为0时的预测值</li>
<li>βᵢ：回归系数，特征每增加1单位对y的影响</li>
<li>ε：误差项，实际值与预测值的差异</li>
</ul>

<h3>📊 参数估计</h3>
<p>使用最小二乘法（OLS）估计参数，目标是最小化残差平方和：Σ(yᵢ - ŷᵢ)²。求解公式：β = (XᵀX)⁻¹Xᵀy</p>

<h3>📉 模型评估指标</h3>
<ul>
<li><strong>R²（决定系数）</strong>：模型解释的变异比例，范围[0,1]，越接近1越好</li>
<li><strong>调整R²</strong>：考虑特征数量的R²，防止过拟合</li>
<li><strong>MSE（均方误差）</strong>：预测误差平方的平均值，越小越好</li>
<li><strong>RMSE（均方根误差）</strong>：MSE的平方根，与原数据单位一致</li>
<li><strong>MAE（平均绝对误差）</strong>：绝对误差的平均值，更稳健</li>
</ul>

<h3>⚠️ 假设条件</h3>
<p>线性回归需要满足以下假设：线性关系、误差独立、误差同方差、误差正态分布、无多重共线性。</p>`,
