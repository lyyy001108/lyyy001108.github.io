        }
        .container {

            margin: 0 auto;
        }
        .hero {
            background: rgba(255,252,245,0.75);

            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(210,180,160,0.4);
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #568469;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #8ba18e;
            margin-bottom: 1rem;
        }
        .stats-badge {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .stats-badge span {
            background: rgba(255,255,255,0.6);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #b27a8a;
        }
        .stats-badge i {
            margin-right: 0.3rem;
        }
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }

            font-size: 1.6rem;
            font-weight: 600;
            color: #568469;
        }

            background: #fceae3;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: #c28a7a;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .course-card {
            background: rgba(255,255,250,0.9);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 1.3rem;
            transition: all 0.3s ease;
            border: 1px solid #f0dfd6;
        }
        .course-card:hover {
            transform: translateY(-6px);
            background: white;
            border-color: #f5cfc0;

        }
        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .course-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #568469;
            margin: 0.3rem 0;
        }
        .course-desc {
            font-size: 0.85rem;
            color: #8ba18e;
            margin-bottom: 0.8rem;
        }

            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.7rem;
            color: #b29a8a;
        }
        .start-btn {
            background: #dbbcac;
            border: none;
            padding: 0.6rem;
            border-radius: 2rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-size: 0.85rem;
        }
        .start-btn:hover {
            background: #c59c8a;
        }
        .back-btn {
            background: #dbbcac;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .course-detail-wrapper {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .sidebar {
            flex: 1;
            min-width: 220px;
            background: rgba(255,252,245,0.7);
            border-radius: 1.5rem;
            padding: 1.2rem;
            position: sticky;
            top: 1rem;
            height: fit-content;
        }
        .sidebar h3 {
            color: #568469;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .toc-list {
            list-style: none;
        }
        .toc-list li {
            margin: 0.8rem 0;
        }
        .toc-list a {
            text-decoration: none;
            color: #8ba18e;
            font-size: 0.85rem;
            transition: 0.2s;
            cursor: pointer;
        }
        .toc-list a:hover {
            color: #c28a7a;
            padding-left: 5px;
        }

            flex: 3;
            min-width: 300px;
        }

            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;

            margin-bottom: 0.8rem;

            background: #f0f0e8;
            padding: 1rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            margin: 0.8rem 0;
            position: relative;
        }
        .copy-btn {
            background: #dbbcac;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            color: white;
            cursor: pointer;
            float: right;
        }
        .quiz-area {
            background: #fefaf5;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .question {
            margin-bottom: 1.2rem;
            padding: 1rem;
            background: white;
            border-radius: 1.2rem;
        }
        .timer {
            font-weight: bold;
            color: #c28a7a;
            margin-bottom: 0.5rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }
        .option {
            background: #fef5f0;
            padding: 0.5rem 1rem;
            border-radius: 2rem;

            transition: 0.2s;
        }
        .option:hover {

        }
        .quiz-result {
            background: #e0f0e4;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
        }
        .progress-bar {
            height: 4px;
            background: #e0e0d0;
            border-radius: 5px;
            margin: 0.5rem 0;
        }
        .progress-fill {
            height: 100%;
            background: #c28a7a;
            border-radius: 5px;
            width: 0%;
        }
        @media (max-width: 760px) {
            body { padding: 1rem; }
            .course-detail-wrapper { flex-direction: column; }

</head>

                { text: "AARRR模型中的第一个A代表？", options: ["激活", "获取", "留存", "收入"], correct: 1 },
                { text: "OSM模型中的S代表？", options: ["目标", "策略", "度量", "系统"], correct: 2 },
                { text: "以下哪个是指引团队方向的北极星指标？", options: ["日活跃用户", "点击率", "跳出率", "加载时间"], correct: 0 },
                { text: "最后一次点击归因属于？", options: ["单触点归因", "多触点归因", "算法归因", "无归因"], correct: 0 },
                { text: "以下哪个工具常用于搭建数据看板？", options: ["Excel", "Power BI", "PPT", "Word"], correct: 1 }
            ] 
        },
        { 
            id: 10, icon: "🚀", name: "项目实战", shortDesc: "完整商业分析案例", duration: "90分钟", level: "进阶",
            desc: "综合运用所学技能，完成一个从数据采集到报告输出的完整商业分析项目。",
            chapters: ["问题定义", "数据采集", "数据清洗", "分析与建模", "报告输出"],
            content: {
                "问题定义": "明确业务问题，拆解为数据分析任务。",
                "数据采集": "从数据库、API、Excel等多源获取数据。",
                "数据清洗": "处理缺失值、异常值，保证数据质量。",
                "分析与建模": "描述性分析、诊断性分析、预测建模。",
                "报告输出": "PPT/PDF报告，故事化呈现分析结论。"
            },
            questions: [
                { text: "数据分析项目的第一步通常是？", options: ["数据采集", "数据清洗", "问题定义", "模型训练"], correct: 2 },
                { text: "以下哪个用于描述数据的基本统计特征？", options: ["描述性分析", "诊断性分析", "预测性分析", "规范性分析"], correct: 0 },
                { text: "完整商业分析项目最后一步是什么？", options: ["模型训练", "数据清洗", "报告输出", "数据采集"], correct: 2 },
                { text: "以下哪个是数据可视化的主要作用？", options: ["数据存储", "数据计算", "数据传达", "数据采集"], correct: 2 },
                { text: "CRISP-DM是数据挖掘的什么？", options: ["算法", "流程标准", "数据库", "编程语言"], correct: 1 }
            ] 
        }
    ];

    // ==================== 全局状态 ====================
    let currentView = 'list';
    let currentCourse = null;
    let quizState = {};

    // ==================== 渲染函数 ====================
    function render() {
        const app = document.getElementById('app');
        if (currentView === 'list') {
            // 渲染课程列表
            app.innerHTML = `
                <div class="hero">
                    <h1>🍃 李颖 · 数据分析训练营</h1>
                    <p class="subtitle">从零到一，掌握商务数据分析核心技能</p>
                    <div class="stats-badge">
                        <span><i class="fas fa-book-open"></i> 10 门实战课程</span>
                        <span><i class="fas fa-code"></i> 50+ 单元测试</span>
                        <span><i class="fas fa-certificate"></i> 完成获认证</span>
                    </div>
                </div>
                <div class="section-header">
                    <i class="fas fa-candy-cane"></i>
                    <h2>精选项目</h2>
                    <span class="count">共 10 个项目</span>
                </div>
                <div class="courses-grid" id="coursesGrid"></div>
            `;
            const grid = document.getElementById('coursesGrid');
            courses.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="card-icon">${course.icon}</div>
                    <div class="course-name">${course.name}</div>
                    <div class="course-desc">${course.shortDesc}</div>
                    <div class="course-meta">
                        <span><i class="far fa-clock"></i> ${course.duration}</span>
                        <span><i class="fas fa-chart-line"></i> ${course.level}</span>
                    </div>
                    <button class="start-btn" data-id="${course.id}">开始学习 →</button>
                `;
                card.querySelector('.start-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    startCourse(course.id);
                });
                grid.appendChild(card);
            });
        } else if (currentView === 'detail' && currentCourse) {
            const qState = quizState[currentCourse.id] || { currentIndex: 0, answers: [], timeLeft: 30, timerInterval: null };
            if (!quizState[currentCourse.id]) quizState[currentCourse.id] = qState;
            const questions = currentCourse.questions;
            const isFinished = qState.currentIndex >= questions.length;
            
            // 构建目录
            let tocHtml = '';
            currentCourse.chapters.forEach(ch => {
                tocHtml += `<li><a class="scroll-link" data-target="${ch}">${ch}</a></li>`;
            });
            
            // 构建内容区域
            let contentHtml = '';
            currentCourse.chapters.forEach(ch => {
                contentHtml += `
                    <div class="content-section" id="section-${ch}">
                        <h3>${ch}</h3>
                        <p>${currentCourse.content[ch]}</p>
                        <div class="code-block">
                            <button class="copy-btn" data-code="${ch}">复制代码</button>
                            <pre style="margin-top:0.5rem">${getSampleCode(ch)}</pre>
                        </div>
                    </div>
                `;
            });
            
            // 测试区域
            let quizHtml = '';
            if (!isFinished) {
                const currentQ = questions[qState.currentIndex];
                quizHtml = `
                    <div class="quiz-area">
                        <h3>📝 单元测试</h3>
                        <div class="question">
                            <div class="timer">⏱️ 剩余时间: <span id="timer">${qState.timeLeft}</span> 秒</div>
                            <div><strong>第 ${qState.currentIndex+1} / ${questions.length} 题</strong></div>
                            <div style="margin: 0.8rem 0">${currentQ.text}</div>
                            <div class="options" id="options">
                                ${currentQ.options.map((opt, idx) => `<div class="option" data-opt="${idx}">${String.fromCharCode(65+idx)}. ${opt}</div>`).join('')}
                            </div>
                            <button id="nextBtn" style="background:#dbbcac; border:none; padding:0.5rem 1rem; border-radius:2rem; margin-top:1rem; cursor:pointer;">下一题</button>
                        </div>
                    </div>
                `;
            } else {
                const correctCount = qState.answers.filter((a,i) => a === questions[i].correct).length;
                quizHtml = `
                    <div class="quiz-area">
                        <h3>📊 测试结果</h3>
                        <div class="quiz-result">
                            <div>得分：${correctCount} / ${questions.length}</div>
                            <div>${correctCount === questions.length ? '🎉 完美！继续下一门吧 🎉' : '📚 再复习一下，下次更好～'}</div>
                            <button id="resetQuiz" style="background:#dbbcac; border:none; padding:0.5rem 1rem; border-radius:2rem; margin-top:1rem; cursor:pointer;">重新测试</button>
                        </div>
                    </div>
                `;
            }
            
            app.innerHTML = `
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> 返回课程列表</button>
                <div class="course-detail-wrapper">
                    <div class="sidebar">
                        <h3>📖 课程目录</h3>
                        <ul class="toc-list">${tocHtml}</ul>
                        <div class="progress-bar"><div class="progress-fill" id="readingProgress"></div></div>
                    </div>
                    <div class="main-content">
                        <div class="content-section"><h3>📌 ${currentCourse.name}</h3><p>${currentCourse.desc}</p></div>
                        ${contentHtml}
                        ${quizHtml}
                    </div>
                </div>
            `;
            
            // 绑定目录滚动
            document.querySelectorAll('.scroll-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    const targetId = link.getAttribute('data-target');
                    document.getElementById(`section-${targetId}`)?.scrollIntoView({ behavior: 'smooth' });
                });
            });
            
            // 进度条
            function updateProgress() {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const percent = (scrollTop / docHeight) * 100;
                const fill = document.getElementById('readingProgress');
                if (fill) fill.style.width = percent + '%';
            }
            window.addEventListener('scroll', updateProgress);
            updateProgress();
            
            // 复制代码
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const code = btn.getAttribute('data-code');
                    const sample = getSampleCode(code);
                    navigator.clipboard.writeText(sample);
                    btn.innerText = '已复制！';
                    setTimeout(() => btn.innerText = '复制代码', 1000);
                });
            });
            
            if (!isFinished) {
                // 计时器
                if (qState.timerInterval) clearInterval(qState.timerInterval);
                qState.timerInterval = setInterval(() => {
                    if (quizState[currentCourse.id] && quizState[currentCourse.id].timeLeft > 0) {
                        quizState[currentCourse.id].timeLeft--;
                        const timerSpan = document.getElementById('timer');
                        if (timerSpan) timerSpan.innerText = quizState[currentCourse.id].timeLeft;
                        if (quizState[currentCourse.id].timeLeft === 0) {
                            clearInterval(quizState[currentCourse.id].timerInterval);
                            alert('时间到！进入下一题');
                            nextQuestion();
                        }
                    }
                }, 1000);
                
                // 选项点击
                document.querySelectorAll('.option').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const selected = parseInt(opt.getAttribute('data-opt'));
                        quizState[currentCourse.id].answers[quizState[currentCourse.id].currentIndex] = selected;
                        document.querySelectorAll('.option').forEach(o => o.style.background = '#fef5f0');
                        opt.style.background = '#e0f0e4';
                    });
                });
                
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.addEventListener('click', () => nextQuestion());
            } else {
                const resetBtn = document.getElementById('resetQuiz');
                if (resetBtn) resetBtn.addEventListener('click', () => {
                    clearInterval(quizState[currentCourse.id]?.timerInterval);
                    quizState[currentCourse.id] = { currentIndex: 0, answers: [], timeLeft: 30, timerInterval: null };
                    render();
                });
            }
            
            const backBtn = document.getElementById('backBtn');
            backBtn.addEventListener('click', () => {
                if (quizState[currentCourse.id]?.timerInterval) clearInterval(quizState[currentCourse.id].timerInterval);
                currentView = 'list';
                render();
            });
        }
    }
    
    function getSampleCode(chapter) {
        const codes = {
            "变量与数据类型": "x = 10\nname = '李颖'\nprint(x, name)",
            "控制流": "score = 85\nif score >= 60:\n    print('及格')\nelse:\n    print('不及格')",
            "函数定义": "def greet(name):\n    return f'你好, {name}'\nprint(greet('李颖'))",
            "列表与字典": "my_list = [1, 2, 3]\nmy_dict = {'name': '李颖', 'age': 20}",
            "文件操作": "with open('data.txt', 'r') as f:\n    content = f.read()",
            "Series与DataFrame": "import pandas as pd\ns = pd.Series([1,2,3])\ndf = pd.DataFrame({'A':[1,2], 'B':[3,4]})",
            "数据筛选与索引": "df.loc[0]  # 按标签\n df.iloc[0] # 按位置",
            "缺失值处理": "df.isna().sum()\ndf.dropna()\ndf.fillna(0)",
            "分组聚合": "df.groupby('类别')['销售额'].sum()",
            "数据合并": "pd.concat([df1, df2])\npd.merge(df1, df2, on='key')"
        };
        return codes[chapter] || "示例代码";
    }
    
    function nextQuestion() {
        const qState = quizState[currentCourse.id];
        if (qState.answers[qState.currentIndex] === undefined) {
            alert('请先选择答案');
            return;
        }
        qState.currentIndex++;
        if (qState.currentIndex >= currentCourse.questions.length) {
            clearInterval(qState.timerInterval);
            render();
        } else {
            qState.timeLeft = 30;
            render();
        }
    }
    
    function startCourse(courseId) {
        if (quizState[courseId]?.timerInterval) clearInterval(quizState[courseId].timerInterval);
        const course = courses.find(c => c.id === courseId);
        if (course) {
            currentCourse = course;
            if (!quizState[courseId]) {
                quizState[courseId] = { currentIndex: 0, answers: [], timeLeft: 30, timerInterval: null };
            }
            currentView = 'detail';
            render();
        }
    }
    
    render();
</script>
</body>
</html>
