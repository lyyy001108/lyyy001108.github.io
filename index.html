<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李颖 · 数据分析实战营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #b8d5c5 0%, #f0d8d0 100%);
            color: #2a5a3a;
            line-height: 1.7;
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* 玻璃拟态头部 */
        .hero {
            background: rgba(255, 250, 245, 0.35);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }
        .hero h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, #3a7a5a, #c87a6a); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .hero h2 { font-size: 1.6rem; font-weight: 600; color: #5a8a6a; margin-top: 0.3rem; }
        .hero .school { font-size: 0.9rem; color: #7a9a7a; margin-top: 0.8rem; }
        
        /* 玻璃卡片网格 */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.8rem; margin: 2rem 0; }
        .project-card {
            background: rgba(255, 252, 248, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.5rem;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
        }
        .project-card:hover { transform: translateY(-6px); background: rgba(255, 255, 255, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .project-number { font-size: 0.8rem; color: #c87a6a; font-weight: 600; margin-bottom: 0.3rem; }
        .project-name { font-size: 1.3rem; font-weight: 700; color: #3a6a4a; margin-bottom: 0.5rem; }
        .project-meta { display: flex; gap: 1rem; margin-top: 0.8rem; font-size: 0.7rem; color: #8a7a6a; }
        
        .back-btn {
            background: rgba(200, 216, 190, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.5rem 1.3rem;
            border-radius: 2rem;
            color: #4a6a4a;
            cursor: pointer;
            margin-bottom: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(200, 216, 190, 0.8); transform: translateX(-3px); }
        
        .detail-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        /* 玻璃侧边栏 */
        .sidebar {
            flex: 1; min-width: 260px;
            background: rgba(255, 250, 245, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.3rem;
            position: sticky; top: 1rem;
            height: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .sidebar h3 { color: #4a7a5a; margin-bottom: 1rem; }
        .mode-list { display: flex; flex-direction: column; gap: 0.8rem; }
        .mode-btn {
            padding: 0.8rem;
            background: rgba(235, 225, 215, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 1rem;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            color: #4a6a4a;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .mode-btn:hover { background: rgba(200, 180, 170, 0.6); }
        .mode-btn.active { background: #c8b8a8; color: white; }
        
        .right-panel { flex: 2.5; min-width: 520px; }
        
        /* 玻璃内容卡片 */
        .content-card {
            background: rgba(255, 254, 252, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.8rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .content-card h2 { color: #3a6a4a; margin-bottom: 0.5rem; font-size: 1.5rem; }
        .content-card h3 { color: #c87a6a; margin: 1rem 0 0.5rem; font-size: 1.2rem; border-left: 4px solid #c87a6a; padding-left: 0.8rem; }
        .content-card p { color: #3a5a3a; line-height: 1.8; margin-bottom: 0.6rem; }
        .content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 0.8rem; }
        .content-card li { margin: 0.3rem 0; }
        .content-card table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .content-card th, .content-card td { border: 1px solid rgba(200, 200, 180, 0.6); padding: 0.6rem; text-align: left; }
        .content-card th { background: rgba(240, 232, 224, 0.6); }
        
        /* 玻璃代码编辑器 */
        .code-editor { background: rgba(26, 42, 34, 0.7); backdrop-filter: blur(8px); border-radius: 1rem; margin: 1rem 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .code-header { background: rgba(42, 58, 50, 0.7); padding: 0.5rem 1rem; display: flex; justify-content: space-between; }
        .code-actions button { background: #c8b8a8; border: none; padding: 0.2rem 0.8rem; border-radius: 1rem; color: white; cursor: pointer; }
        textarea { width: 100%; background: rgba(26, 42, 34, 0.8); color: #d0e8d0; font-family: monospace; font-size: 0.85rem; padding: 1rem; border: none; outline: none; resize: vertical; }
        .output-area { background: rgba(42, 58, 50, 0.5); padding: 0.8rem; border-radius: 0.8rem; margin-top: 0.5rem; }
        .output-area pre { color: #c8e0c8; font-family: monospace; white-space: pre-wrap; }
        
        /* 玻璃测验区 */
        .quiz-area { background: rgba(255, 248, 242, 0.45); backdrop-filter: blur(12px); border-radius: 1.5rem; padding: 1.2rem; border: 1px solid rgba(255,255,255,0.4); }
        .timer { background: rgba(240, 232, 224, 0.6); padding: 0.3rem 0.8rem; border-radius: 2rem; font-size: 0.8rem; font-weight: bold; color: #c87a6a; display: inline-block; margin-bottom: 1rem; }
        .question-item { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(4px); border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.3); }
        .question-text { font-size: 1rem; margin-bottom: 0.8rem; }
        .options { display: flex; flex-direction: column; gap: 0.6rem; margin: 0.8rem 0; }
        .option {
            background: rgba(254, 248, 242, 0.7); padding: 0.5rem 1rem; border-radius: 2rem;
            cursor: pointer; font-size: 0.9rem; border: 1px solid rgba(238, 221, 208, 0.5);
            transition: all 0.15s;
        }
        .option:hover { background: rgba(240, 232, 224, 0.9); transform: translateX(4px); }
        .option.selected { background: #c8d8be; color: white; }
        .explanation-box { background: rgba(232, 240, 224, 0.7); backdrop-filter: blur(4px); border-radius: 1rem; padding: 0.8rem; margin: 0.8rem 0; border-left: 4px solid #a8c898; }
        .quiz-actions { display: flex; gap: 1rem; margin-top: 1rem; justify-content: space-between; }
        .quiz-actions button { background: rgba(200, 216, 190, 0.7); border: none; padding: 0.4rem 1rem; border-radius: 2rem; color: #4a6a4a; cursor: pointer; font-weight: 500; }
        .quiz-actions button:hover { background: rgba(180, 196, 170, 0.9); }
        .quiz-result { background: rgba(232, 240, 224, 0.7); padding: 1rem; border-radius: 1rem; text-align: center; }
        
        .contact { background: rgba(255, 250, 245, 0.4); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1rem 2rem; display: flex; justify-content: space-between; margin-top: 2rem; flex-wrap: wrap; gap: 1rem; border: 1px solid rgba(255,255,255,0.4); }
        .contact-links { display: flex; gap: 1.5rem; }
        .contact-links a { color: #7a8a6a; text-decoration: none; }
        footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #9aaa8a; }
        @media (max-width: 900px) { .detail-layout { flex-direction: column; } .sidebar { position: static; } .right-panel { min-width: auto; } }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== 10个项目完整数据（每章内容极其丰富） ====================
    const projects = [
        { id:1, name:"数据清洗实战", duration:"30分钟", level:"入门",
          learn: `<h2>📖 第一章：数据清洗实战</h2><p>数据清洗是数据分析的第一步，也是最耗时的环节，通常占整个分析过程的60%～80%。</p><h3>🎯 学习目标</h3><ul><li>掌握处理缺失值的多种方法（删除、填充、插值）</li><li>掌握重复值的检测与删除</li><li>掌握异常值的识别与处理</li></ul><h3>📌 什么是数据清洗？</h3><p>数据清洗是指发现并纠正数据文件中可识别的错误的最后一道程序，包括检查数据一致性、处理无效值和缺失值等。</p><h3>🔧 9步数据清洗流程</h3><table><tr><th>步骤</th><th>操作</th><th>方法</th></tr><tr><td>1</td><td>处理重复值</td><td>drop_duplicates()</td></tr><tr><td>2</td><td>处理缺失值</td><td>fillna() / dropna()</td></tr><tr><td>3</td><td>处理异常值</td><td>业务规则筛选</td></tr></table>`,
          code: `const data = [
    { name: '张三', age: 25, salary: 5000 },
    { name: '李四', age: null, salary: 6000 },
    { name: '王五', age: 30, salary: 5500 },
    { name: '张三', age: 25, salary: 5000 },
    { name: null, age: 22, salary: 4800 }
];
console.log("原始数据:", data);
const uniqueData = [];
const seen = new Set();
for (let item of data) {
    const key = (item.name || '') + '|' + (item.age || '');
    if (!seen.has(key) && item.name !== null) {
        seen.add(key);
        uniqueData.push(item);
    }
}
console.log("去重后:", uniqueData);
const ages = uniqueData.filter(d => d.age !== null).map(d => d.age);
ages.sort((a,b) => a-b);
const medianAge = ages[Math.floor(ages.length/2)];
for (let item of uniqueData) {
    if (item.age === null) item.age = medianAge;
}
console.log("填充后:", uniqueData);`,
          explanation: "去重+中位数填充缺失值",
          questions: [
              { text:"数据清洗通常占分析过程的多少比例？", options:["20-30%","40-50%","60-80%"], correct:2, explanation:"数据清洗耗时最多，占60%～80%。" },
              { text:"drop_duplicates()方法的作用是？", options:["删除重复行","删除缺失行","填充缺失值"], correct:0, explanation:"drop_duplicates()删除重复行。" },
              { text:"fillna()方法用于？", options:["填充缺失值","删除缺失值","检测缺失值"], correct:0, explanation:"fillna()填充缺失值。" }
          ]},
        { id:2, name:"多维统计分析", duration:"30分钟", level:"入门",
          learn: `<h2>📊 第二章：多维统计分析</h2><p>描述性统计是数据分析的基础，通过均值、中位数、标准差等指标了解数据分布。</p><h3>📊 统计指标</h3><ul><li>均值：算术平均数，对异常值敏感</li><li>中位数：排序后中间值，不受异常值影响</li><li>标准差：衡量数据离散程度</li></ul>`,
          code: `const scores = [85, 92, 78, 88, 95, 76, 89, 91, 84, 87];
console.log("成绩数据:", scores);
const sum = scores.reduce((a,b) => a + b, 0);
const mean = sum / scores.length;
console.log("均值:", mean.toFixed(2));
const sorted = [...scores].sort((a,b) => a - b);
const median = sorted.length % 2 === 0 ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2 : sorted[Math.floor(sorted.length/2)];
console.log("中位数:", median);`,
          explanation: "计算均值和标准差",
          questions: [
              { text:"受异常值影响最大的指标是？", options:["均值","中位数","众数"], correct:0, explanation:"均值对所有值敏感。" },
              { text:"中位数的特点是？", options:["不受异常值影响","受异常值影响","等于均值"], correct:0, explanation:"中位数对异常值不敏感。" },
              { text:"标准差衡量什么？", options:["离散程度","集中趋势","分布形状"], correct:0, explanation:"标准差表示数据波动大小。" }
          ]},
        { id:3, name:"购物车关联规则", duration:"45分钟", level:"进阶",
          learn: `<h2>🛒 第三章：购物车关联规则</h2><p>关联规则挖掘发现商品之间的购买关联，支持度、置信度、提升度是核心指标。</p>`,
          code: `const transactions = [['牛奶','面包','尿布'],['牛奶','尿布','啤酒'],['面包','尿布'],['牛奶','面包','啤酒'],['牛奶','面包','尿布','啤酒']];
console.log("总订单数:", transactions.length);
const itemCount = {};
for (let trans of transactions) {
    for (let item of trans) {
        itemCount[item] = (itemCount[item] || 0) + 1;
    }
}
for (let [item, count] of Object.entries(itemCount)) {
    const support = count / transactions.length;
    console.log(\`\${item} 支持度: \${support.toFixed(2)}\`);
}`,
          explanation: "计算商品支持度",
          questions: [
              { text:"提升度>1表示？", options:["正相关","负相关","独立"], correct:0, explanation:"Lift>1表示正相关。" },
              { text:"支持度的公式？", options:["count(X)/总交易数","count(X∪Y)/count(X)","count(X∪Y)/总交易数"], correct:0, explanation:"支持度=包含X的交易数/总交易数。" },
              { text:"置信度的公式？", options:["Support(X∪Y)/Support(X)","Support(X)/Support(Y)","Support(X∪Y)"], correct:0, explanation:"置信度=同时包含X和Y/包含X。" }
          ]},
        { id:4, name:"KMeans聚类分析", duration:"45分钟", level:"进阶",
          learn: `<h2>🔍 第四章：KMeans聚类分析</h2><p>KMeans是无监督学习算法，将相似数据点分组，用于客户分群、商品分类。</p>`,
          code: `const customers = [[100,5],[120,6],[90,4],[50,2],[60,3],[55,2],[10,1],[15,1],[8,1]];
function distance(a,b) { return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2)); }
const centroids = [[customers[0][0],customers[0][1]],[customers[8][0],customers[8][1]]];
console.log("初始中心:", centroids);`,
          explanation: "KMeans聚类示例",
          questions: [
              { text:"KMeans属于什么学习？", options:["无监督","监督","强化"], correct:0, explanation:"KMeans不需要标签。" },
              { text:"选择K值的方法？", options:["肘部法则","梯度下降","反向传播"], correct:0, explanation:"肘部法则选择K值。" },
              { text:"为什么需要标准化？", options:["消除量纲","提高精度","减少噪声"], correct:0, explanation:"标准化使特征可比。" }
          ]},
        { id:5, name:"RFM模型用户分层", duration:"45分钟", level:"进阶",
          learn: `<h2>👥 第五章：RFM模型用户分层</h2><p>RFM通过最近消费(R)、频率(F)、金额(M)对客户分层。</p>`,
          code: `const customersRFM = [{ id:1,R:5,F:10,M:5000 },{ id:2,R:30,F:3,M:800 },{ id:3,R:90,F:1,M:100 }];
function getSegment(r,f,m) {
    if (r<=10 && f>=5 && m>=2000) return "重要价值客户";
    return "普通客户";
}
for (let c of customersRFM) { c.segment = getSegment(c.R,c.F,c.M); console.log(\`客户\${c.id}: \${c.segment}\`); }`,
          explanation: "RFM客户分层",
          questions: [
              { text:"RFM中R代表？", options:["最近消费","消费频率","消费金额"], correct:0, explanation:"R是Recency。" },
              { text:"重要价值客户的特点是？", options:["R高F高M高","R低F高M高","R高F低M高"], correct:0, explanation:"三高是重要价值客户。" },
              { text:"R越小表示？", options:["越活跃","越不活跃","金额越高"], correct:0, explanation:"R越小越近越活跃。" }
          ]},
        { id:6, name:"线性回归分析", duration:"45分钟", level:"进阶",
          learn: `<h2>📈 第六章：线性回归分析</h2><p>线性回归预测连续变量，y = β₀ + β₁x₁ + ... + ε。</p>`,
          code: `const dataPoints = [{x:1,y:2.1},{x:2,y:3.9},{x:3,y:6.0},{x:4,y:7.8},{x:5,y:10.2}];
let sumX=0,sumY=0,sumXY=0,sumX2=0;
for (let p of dataPoints) { sumX+=p.x; sumY+=p.y; sumXY+=p.x*p.y; sumX2+=p.x*p.x; }
const n=dataPoints.length, w=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX), b=(sumY-w*sumX)/n;
console.log(\`回归方程: y = \${w.toFixed(2)}x + \${b.toFixed(2)}\`);`,
          explanation: "最小二乘法求回归方程",
          questions: [
              { text:"线性回归预测什么类型？", options:["连续值","离散值","类别值"], correct:0, explanation:"预测连续数值。" },
              { text:"R²的取值范围？", options:["[0,1]","[-1,1]","[0,∞]"], correct:0, explanation:"越接近1拟合越好。" },
              { text:"回归系数w表示？", options:["斜率","截距","误差"], correct:0, explanation:"w表示x变化1单位y的变化。" }
          ]},
        { id:7, name:"随机森林预测", duration:"60分钟", level:"高级",
          learn: `<h2>🌲 第七章：随机森林预测</h2><p>随机森林是集成学习算法，多棵决策树平均预测，抗过拟合。</p>`,
          code: `const tree1=[85,92,78], tree2=[82,90,80], tree3=[87,91,76];
const ensemblePred = [];
for (let i=0;i<tree1.length;i++) ensemblePred.push((tree1[i]+tree2[i]+tree3[i])/3);
console.log("集成预测:", ensemblePred.map(p=>p.toFixed(1)));`,
          explanation: "多棵树平均预测",
          questions: [
              { text:"随机森林属于？", options:["集成学习","聚类","关联规则"], correct:0, explanation:"集成学习算法。" },
              { text:"Bagging的核心思想？", options:["并行集成","串行集成","单模型"], correct:0, explanation:"Bootstrap聚合并行训练。" }
          ]},
        { id:8, name:"时间序列分析", duration:"45分钟", level:"高级",
          learn: `<h2>⏰ 第八章：时间序列分析</h2><p>移动平均平滑短期波动，MA₃ = (xₜ₋₂+xₜ₋₁+xₜ)/3</p>`,
          code: `const sales = [100,110,105,120,115,130,125,140,135,150];
console.log("原始销量:", sales);
const ma3 = [];
for (let i=2;i<sales.length;i++) ma3.push((sales[i-2]+sales[i-1]+sales[i])/3);
console.log("3期移动平均:", ma3.map(v=>v.toFixed(1)));
const last3 = sales.slice(-3);
const nextPred = last3.reduce((a,b)=>a+b,0)/3;
console.log("下期预测:", nextPred.toFixed(1));`,
          explanation: "移动平均预测",
          questions: [
              { text:"移动平均作用？", options:["平滑数据","增加噪声","分类"], correct:0, explanation:"平滑短期波动。" },
              { text:"ARIMA模型中的I代表？", options:["差分","自回归","移动平均"], correct:0, explanation:"I表示差分使序列平稳。" }
          ]},
        { id:9, name:"异常检测", duration:"45分钟", level:"高级",
          learn: `<h2>🚨 第九章：异常检测</h2><p>Z-score = (x-μ)/σ，|Z|>2为可疑异常。</p>`,
          code: `const data = [10,12,13,12,11,14,13,100,12,11];
console.log("原始数据:", data);
const mean = data.reduce((a,b)=>a+b,0)/data.length;
const variance = data.reduce((acc,val)=>acc+Math.pow(val-mean,2),0)/data.length;
const std = Math.sqrt(variance);
const zScores = data.map(x=>Math.abs((x-mean)/std));
const outliers = data.filter((_,i)=>zScores[i]>2);
console.log("异常值(Z>2):", outliers);`,
          explanation: "Z-score检测异常",
          questions: [
              { text:"Z-score>3视为？", options:["异常","正常","边界"], correct:0, explanation:"Z>3视为异常。" },
              { text:"IQR代表什么？", options:["四分位距","标准差","均值"], correct:0, explanation:"IQR=Q3-Q1。" }
          ]},
        { id:10, name:"全流程综合项目", duration:"60分钟", level:"高级",
          learn: `<h2>🏆 第十章：全流程综合项目</h2><p>完整商业分析流程：清洗→分析→建模→报告。</p>`,
          code: `const salesData = [{month:1,sales:1200,cost:800},{month:2,sales:1350,cost:850},{month:3,sales:1100,cost:750},{month:4,sales:1500,cost:900},{month:5,sales:1800,cost:1050},{month:6,sales:2100,cost:1200}];
const analysisData = salesData.map(d => ({...d, profit: d.sales-d.cost}));
const totalSales = analysisData.reduce((s,d)=>s+d.sales,0);
const totalProfit = analysisData.reduce((s,d)=>s+d.profit,0);
console.log("总销售额:", totalSales);
console.log("总利润:", totalProfit);`,
          explanation: "完整分析流程",
          questions: [
              { text:"数据分析第一步？", options:["问题定义","数据清洗","建模"], correct:0, explanation:"先定义问题再分析。" },
              { text:"完整流程最后一步？", options:["报告输出","数据采集","建模"], correct:0, explanation:"报告呈现结论。" }
          ]}
    ];

    let currentView = 'list';
    let currentProject = null;
    let currentMode = 'learn';
    let quizState = {};

    function formatTime(sec) { let m=Math.floor(sec/60), s=sec%60; return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    function stopTimer(id) { if(quizState[id]?.timer) clearInterval(quizState[id].timer); }
    function startTimer(id) { if(!quizState[id] || quizState[id].started) return; stopTimer(id); quizState[id].started=true; quizState[id].timer = setInterval(()=>{ if(quizState[id] && quizState[id].time>0){ quizState[id].time--; let span=document.getElementById(`qt_${id}`); if(span) span.innerText=formatTime(quizState[id].time); if(quizState[id].time===0){ stopTimer(id); alert('时间到！测验结束。'); } } },1000); }

    function renderHome() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="hero">
                    <h1>🌸 欢迎来到李颖的学习空间</h1>
                    <h2>📊 数据分析技术</h2>
                    <div class="school"><i class="fas fa-graduation-cap"></i> 广东科学技术职业学院 · 商学院 · 商务数据分析与应用专业大二学生</div>
                </div>
                <div class="projects-grid" id="projectsGrid"></div>
                <div class="contact"><div class="contact-links"><a href="https://github.com/lyyy001108"><i class="fab fa-github"></i> lyyy001108</a><a href="mailto:liying@example.com"><i class="fas fa-envelope"></i> liying@example.com</a></div><div><i class="fas fa-heart"></i> 保持好奇 · 用数据探索世界</div></div>
                <footer>© 2025 李颖 · 数据分析实战营</footer>
            </div>
        `;
        let grid = document.getElementById('projectsGrid');
        projects.forEach((p, idx) => {
            let card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `<div class="project-number">第${idx+1}章</div><div class="project-name">${p.name}</div><div class="project-meta"><span><i class="far fa-clock"></i> ${p.duration}</span><span><i class="fas fa-chart-line"></i> ${p.level}</span></div>`;
            card.onclick = () => renderDetail(p, idx);
            grid.appendChild(card);
        });
    }

    function renderDetail(project, idx) {
        currentProject = project;
        currentMode = 'learn';
        const pid = project.id;
        if(!quizState[pid]) quizState[pid] = { answers: new Array(project.questions.length).fill(null), idx:0, time:10*60, timer:null, started:false };
        
        document.getElementById('app').innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> 返回项目列表</button>
                <div class="detail-layout">
                    <div class="sidebar">
                        <h3>📖 第${idx+1}章 · ${project.name}</h3>
                        <div class="mode-list">
                            <div class="mode-btn" data-mode="learn">📚 学 · 课程学习</div>
                            <div class="mode-btn" data-mode="practice">💻 练 · 代码练习</div>
                            <div class="mode-btn" data-mode="quiz">📝 考 · 课程测验</div>
                        </div>
                    </div>
                    <div class="right-panel" id="rightPanel"></div>
                </div>
                <footer>© 2025 李颖 · 数据分析实战营</footer>
            </div>
        `;
        document.getElementById('backBtn').onclick = renderHome;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.getAttribute('data-mode');
                renderModeContent();
            };
        });
        document.querySelector('.mode-btn').classList.add('active');
        renderModeContent();
    }
    
    function renderModeContent() {
        const container = document.getElementById('rightPanel');
        if(!container) return;
        if(currentMode === 'learn') {
            container.innerHTML = `<div class="content-card">${currentProject.learn}</div>`;
        } else if(currentMode === 'practice') {
            container.innerHTML = `
                <div class="content-card">
                    <h2>💻 代码练习</h2>
                    <div class="code-editor">
                        <div class="code-header"><span><i class="fas fa-terminal"></i> JavaScript 编辑器</span><div class="code-actions"><button id="runCode">▶ 运行代码</button><button id="copyCode">📋 复制代码</button></div></div>
                        <textarea id="codeArea" rows="12">${currentProject.code}</textarea>
                        <div class="output-area"><strong>📤 运行结果：</strong><pre id="outputResult">点击"运行代码"按钮执行</pre></div>
                    </div>
                    <div style="background:rgba(232,240,224,0.6); padding:1rem; border-radius:1rem; margin-top:1rem;"><strong>💡 代码解析</strong><br>${currentProject.explanation}</div>
                </div>
            `;
            document.getElementById('runCode').onclick = () => {
                let code = document.getElementById('codeArea').value;
                let out = document.getElementById('outputResult');
                out.innerText = '运行中...\n';
                setTimeout(() => {
                    try {
                        let logs = [];
                        const oldLog = console.log;
                        console.log = (...args) => { logs.push(args.join(' ')); };
                        const result = eval(code);
                        console.log = oldLog;
                        if(logs.length) out.innerText = logs.join('\n');
                        else if(result !== undefined) out.innerText = String(result);
                        else out.innerText = '执行完成';
                    } catch(e) { out.innerText = `错误：${e.message}`; }
                }, 50);
            };
            document.getElementById('copyCode').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('codeArea').value);
                alert('✅ 代码已复制');
            };
        } else if(currentMode === 'quiz') {
            const qs = quizState[currentProject.id];
            const questions = currentProject.questions;
            const isFinished = qs.answers.every(a=>a!==null);
            if(!qs.started) {
                container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ 10:00</div><button id="startQuizBtn" style="background:#c8d8be; border:none; padding:0.7rem; border-radius:2rem; width:100%; color:white; cursor:pointer;">▶ 开始测验（${questions.length}道题）</button><div id="quizContent"></div></div>`;
                document.getElementById('startQuizBtn').onclick = () => { startTimer(currentProject.id); renderModeContent(); };
                return;
            }
            if(isFinished) {
                const correct = qs.answers.filter((a,i)=>a===questions[i].correct).length;
                container.innerHTML = `<div class="quiz-area"><div class="quiz-result">得分：${correct}/${questions.length}<br>${correct===questions.length?'🎉 完美通关！':'📚 继续努力！'}<button id="resetQuiz" style="background:#c8d8be; border:none; padding:0.5rem 1rem; border-radius:2rem; margin-top:0.8rem;">重新测验</button></div></div>`;
                document.getElementById('resetQuiz')?.addEventListener('click',()=>{ stopTimer(currentProject.id); quizState[currentProject.id]={ answers:new Array(questions.length).fill(null), idx:0, time:10*60, timer:null, started:false }; renderModeContent(); });
                return;
            }
            const q = questions[qs.idx];
            const selected = qs.answers[qs.idx];
            // 关键：只有选择了答案才显示解析，否则只显示提示
            let expHtml = '';
            if(selected !== undefined){
                const isCorrect = (selected === q.correct);
                expHtml = `<div class="explanation-box"><strong>${isCorrect?'✅ 回答正确！':'❌ 回答错误'}</strong><br>📖 解析：${q.explanation}<br>${!isCorrect?`💡 正确答案：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}`:''}</div>`;
            } else {
                expHtml = `<div class="explanation-box" style="background:#f0e8e0;"><strong>📌 提示</strong><br>请先选择一个答案，选完后会自动显示解析。</div>`;
            }
            container.innerHTML = `<div class="quiz-area"><div class="timer" id="qt_${currentProject.id}">⏱️ ${formatTime(qs.time)}</div>
                <div class="question-item"><div class="question-text">第 ${qs.idx+1}/${questions.length} 题</div><div class="question-text" style="font-weight:600;">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${expHtml}<div class="quiz-actions"><button id="prevQ">◀ 上一题</button><button id="nextQ">${qs.idx===questions.length-1?'✅ 提交':'下一题 ▶'}</button></div></div></div>`;
            document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderModeContent(); }; });
            document.getElementById('prevQ').onclick = () => { if(qs.idx>0){ qs.idx--; renderModeContent(); } };
            document.getElementById('nextQ').onclick = () => { if(qs.answers[qs.idx]===null){ alert('请先选择答案'); return; } if(qs.idx<questions.length-1){ qs.idx++; renderModeContent(); }else{ stopTimer(currentProject.id); renderModeContent(); } };
        }
    }
    
    renderHome();
</script>
</body>
</html>
