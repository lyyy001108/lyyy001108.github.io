<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李颖 · 商务数据分析实训营</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0f0e5 0%, #fdf0ea 100%);
            color: #2c4a3a;
            line-height: 1.5;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* 头部 - 更精致的毛玻璃效果 */
        .hero {
            background: rgba(255,252,245,0.7);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2.2rem;
            margin-bottom: 2rem;
            text-align: center;
            border: 1px solid rgba(160,190,140,0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05);
        }
        .hero h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #3a7b54, #c28a7a); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.5px; }
        .hero .school { font-size: 0.95rem; color: #7a9a82; margin: 0.6rem 0; display: flex; align-items: center; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .hero .bio { font-size: 0.9rem; color: #8aae8a; background: rgba(250,245,240,0.5); padding: 0.5rem 1.5rem; border-radius: 3rem; display: inline-block; backdrop-filter: blur(4px); }
        
        /* 统计卡片 - 更精致 */
        .stats { display: flex; flex-wrap: wrap; gap: 1.2rem; margin: 1.8rem 0 2.5rem; justify-content: center; }
        .stat-card {
            background: rgba(255,252,245,0.7);
            backdrop-filter: blur(8px);
            flex: 1; min-width: 110px; border-radius: 2rem; padding: 1.2rem 0.8rem;
            text-align: center; border: 1px solid rgba(180,210,150,0.3);
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-4px); background: rgba(255,255,250,0.9); border-color: #c8ddc0; }
        .stat-number { font-size: 2.3rem; font-weight: 800; background: linear-gradient(145deg, #5a8f6c, #c28a7a); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .stat-label { font-size: 0.8rem; font-weight: 600; color: #a08a7a; margin-top: 0.3rem; letter-spacing: 0.5px; }
        
        .section-header { display: flex; align-items: baseline; gap: 0.8rem; margin: 2rem 0 1.5rem; }
        .section-title { font-size: 1.6rem; font-weight: 700; color: #4a7a5e; letter-spacing: -0.3px; }
        
        /* 课程网格 */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.8rem; margin-bottom: 2.5rem; }
        .course-card {
            background: rgba(255,255,250,0.85);
            backdrop-filter: blur(8px);
            border-radius: 2rem; padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #ece0d6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            cursor: pointer;
        }
        .course-card:hover { transform: translateY(-6px); background: white; border-color: #e0cdc0; box-shadow: 0 20px 30px -12px rgba(100,70,60,0.12); }
        .card-icon { font-size: 2.3rem; margin-bottom: 0.5rem; }
        .course-name { font-size: 1.25rem; font-weight: 700; color: #4a7a5e; margin: 0.3rem 0; }
        .course-desc { font-size: 0.85rem; color: #8a9e8a; margin-bottom: 0.8rem; line-height: 1.4; }
        .course-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .tag { background: #fce9e0; padding: 0.2rem 0.8rem; border-radius: 2rem; font-size: 0.7rem; color: #c2847a; font-weight: 500; }
        
        /* 详情页布局 */
        .back-btn {
            background: rgba(200,180,165,0.7); backdrop-filter: blur(4px);
            border: none; padding: 0.5rem 1.2rem; border-radius: 2.5rem;
            color: #5a6e5a; cursor: pointer; margin-bottom: 1.5rem;
            display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #c8bcac; color: white; transform: translateX(-3px); }
        
        .detail-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        /* 左侧目录 - 可折叠高级设计 */
        .sidebar {
            flex: 1.2; min-width: 300px;
            background: rgba(255,252,245,0.75);
            backdrop-filter: blur(12px);
            border-radius: 2rem; padding: 1.5rem;
            position: sticky; top: 1rem; height: fit-content;
            border: 1px solid rgba(180,200,150,0.3);
        }
        .sidebar h3 { color: #4a7a5e; margin-bottom: 1.2rem; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
        .toc-list { list-style: none; }
        .toc-item { margin-bottom: 0.8rem; border-radius: 1.2rem; overflow: hidden; background: rgba(255,250,240,0.5); }
        .toc-header {
            padding: 0.8rem 1rem; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; background: rgba(250,240,230,0.6); transition: all 0.2s;
            font-weight: 600; color: #5a7a62; border-radius: 1.2rem;
        }
        .toc-header:hover { background: #f0e0d4; }
        .toc-header.active { background: #dbbcac; color: white; border-radius: 1.2rem 1.2rem 0 0; }
        .toc-header i { transition: transform 0.2s; font-size: 0.8rem; }
        .toc-header.active i { transform: rotate(90deg); }
        .toc-content {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: white; padding: 0 1rem;
        }
        .toc-content.active { max-height: 600px; padding: 1rem; }
        .toc-content h4 { color: #4a7a5e; margin: 0.5rem 0 0.3rem; font-size: 0.9rem; }
        .toc-content p { font-size: 0.85rem; color: #6a8a6a; line-height: 1.5; margin-bottom: 0.8rem; }
        .code-block { background: #f4f0ea; padding: 0.8rem; border-radius: 1rem; font-family: monospace; font-size: 0.75rem; margin: 0.5rem 0; position: relative; }
        .copy-btn { background: #c8bcac; border: none; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.65rem; color: white; cursor: pointer; float: right; margin-left: 0.5rem; }
        
        /* 右侧面板 - 测试区高级设计 */
        .right-panel {
            flex: 1; min-width: 320px;
            position: sticky; top: 1rem; height: fit-content;
        }
        .quiz-card {
            background: rgba(255,250,245,0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem; padding: 1.5rem;
            border: 1px solid #f0e0d4;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.05);
        }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
        .quiz-header h3 { color: #c28a7a; font-size: 1.1rem; }
        .timer {
            background: #fceae3; padding: 0.3rem 0.9rem; border-radius: 2rem;
            font-size: 0.85rem; font-weight: 700; color: #c28a7a; font-family: monospace;
        }
        .start-test-btn {
            background: linear-gradient(135deg, #7CBA96, #9ab87a);
            border: none; padding: 0.6rem; border-radius: 2rem;
            color: white; cursor: pointer; width: 100%; margin-bottom: 1rem;
            font-weight: 600; transition: all 0.2s;
        }
        .start-test-btn:hover { transform: scale(0.98); background: #6aa878; box-shadow: 0 4px 12px rgba(100,70,60,0.1); }
        
        .question-item { background: white; border-radius: 1.5rem; padding: 1rem; margin-bottom: 0.8rem; }
        .options { display: flex; flex-direction: column; gap: 0.6rem; margin: 0.8rem 0; }
        .option {
            background: #fef5f0; padding: 0.5rem 1rem; border-radius: 2rem;
            cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
            border: 1px solid #f0e0d4;
        }
        .option:hover { background: #ffede3; transform: translateX(4px); }
        .option.selected { background: #dbbcac; color: white; border-color: #dbbcac; }
        
        /* 答案解析区域 */
        .explanation-box {
            background: #e8f0e4; border-radius: 1.2rem; padding: 0.8rem 1rem;
            margin: 0.8rem 0; border-left: 4px solid #7CBA96;
        }
        .explanation-box strong { color: #4a7a5e; }
        
        .quiz-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .quiz-actions button {
            background: #d4c0b0; border: none; padding: 0.4rem 1rem;
            border-radius: 2rem; color: white; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s;
        }
        .quiz-actions button:hover { background: #c2a494; transform: translateY(-1px); }
        .quiz-result { background: #e0f0e4; padding: 1rem; border-radius: 1.2rem; text-align: center; }
        
        .contact { background: rgba(255,250,240,0.7); backdrop-filter: blur(8px); border-radius: 2rem; padding: 1rem 2rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-top: 2.5rem; }
        .contact-links { display: flex; gap: 1.5rem; }
        .contact-links a { color: #9a8a7a; text-decoration: none; transition: 0.2s; }
        .contact-links a:hover { color: #c28a7a; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #b1a99a; }
        
        @media (max-width: 900px) { .detail-layout { flex-direction: column; } .sidebar, .right-panel { position: static; } }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // 课程完整数据（每章都有详细学习概况，每题都有解析）
    const courses = [
        { id:1, icon:"🐍", name:"Python基础", shortDesc:"编程语法与数据结构", tags:["编程入门","数据分析"], duration:"40分钟", level:"入门",
          overview:"Python是一种解释型、面向对象的高级编程语言，广泛应用于数据分析、自动化脚本、Web开发及人工智能等领域。本课程将从零开始，带你掌握Python核心语法与编程思维，为后续数据分析打下坚实基础。",
          chapters:["变量与数据类型","控制流","函数定义","列表与字典"],
          content:{
              "变量与数据类型":{"summary":"变量是存储数据的容器，Python是动态类型语言，变量无需声明类型即可使用。掌握数据类型是编程的第一步。","detail":"常见数据类型：int（整数）、float（浮点数）、str（字符串）、bool（布尔值）。例如：age=18, name='小李', is_student=True。变量命名应遵循小写字母+下划线的规范，增强代码可读性。"},
              "控制流":{"summary":"控制流决定程序的执行路径，包括条件判断和循环。","detail":"if-elif-else用于根据条件执行不同代码块；for循环用于遍历序列（列表、字符串等）；while循环在条件为真时重复执行。合理使用控制流可以让程序更智能、更高效。"},
              "函数定义":{"summary":"函数是组织好的、可重复使用的代码块，提高代码复用性。","detail":"使用def关键字定义函数，可接收参数（位置参数、关键字参数、默认参数），并能通过return返回值。例如：def add(a,b): return a+b。函数让代码更模块化、易维护。"},
              "列表与字典":{"summary":"列表和字典是Python最常用的数据结构，用于存储多个数据。","detail":"列表list用[]表示，是有序可变的集合，支持增删改查。字典dict用{}表示，存储键值对，通过键快速访问值，效率极高。例如：fruits=['苹果','香蕉']，person={'name':'小李','age':20}。"}
          },
          codeExamples:{
              "变量与数据类型":"x = 10\nname = '小李'\nprint(f\"{name}今年{x}岁\")",
              "控制流":"for i in range(5):\n    if i % 2 == 0:\n        print(f\"{i}是偶数\")",
              "函数定义":"def add(a, b):\n    return a + b\nresult = add(3, 5)\nprint(result)",
              "列表与字典":"nums = [1,2,3]\nnums.append(4)\nperson = {'name':'小李', 'age':20}\nprint(person['name'])"
          },
          questions:[
              { text:"Python中输出内容到控制台的正确函数是？", options:["input()","print()","output()","console.log()"], correct:1, 
                explanation:"print()是Python的内置输出函数，用于将内容打印到控制台。input()用于接收用户输入。" },
              { text:"以下哪个是Python的单行注释符号？", options:["//","#","/* */","<!-- -->"], correct:1,
                explanation:"Python使用#作为单行注释符号，//是其他语言的注释，#后的内容不会被执行。" },
              { text:"列表的索引从哪个数字开始？", options:["0","1","根据列表长度决定","任意"], correct:0,
                explanation:"Python列表的索引从0开始，第一个元素索引为0，第二个为1，以此类推。" },
              { text:"定义函数的正确关键字是？", options:["func","def","define","function"], correct:1,
                explanation:"Python使用def关键字定义函数，后跟函数名和参数列表。" },
              { text:"字典中通过什么访问对应的值？", options:["索引位置","键名","下标","属性"], correct:1,
                explanation:"字典是键值对结构，通过键（Key）来访问对应的值（Value），例如 person['name']。" }
          ]},
        { id:2, icon:"📊", name:"数据分析技术", shortDesc:"Pandas/NumPy数据处理", tags:["Pandas","可视化"], duration:"45分钟", level:"入门",
          overview:"数据分析技术是商务数据分析的核心技能。本课程将系统讲解Pandas和NumPy的使用，包括数据清洗、转换、聚合、可视化等完整流程，帮助你从原始数据中提取有价值的信息。",
          chapters:["Series与DataFrame","数据筛选与索引","缺失值处理","分组聚合"],
          content:{
              "Series与DataFrame":{"summary":"Series和DataFrame是Pandas的两大核心数据结构。","detail":"Series是一维带标签数组，类似于带索引的列表。DataFrame是二维表格结构，类似于Excel工作表。创建DataFrame：pd.DataFrame({'列名':[值1,值2]})。熟练掌握这两种结构是数据分析的基础。"},
              "数据筛选与索引":{"summary":"数据筛选是从DataFrame中提取特定行或列的关键操作。","detail":"loc按标签名索引（包括行索引和列名），iloc按整数位置索引。布尔索引可进行条件筛选，如 df[df['年龄']>18]。灵活使用索引技巧能大幅提升数据处理效率。"},
              "缺失值处理":{"summary":"现实数据常含有缺失值，需妥善处理以保证分析准确性。","detail":"isna()/isnull()检测缺失值，dropna()删除包含缺失的行或列，fillna()填充缺失值（如用0、均值或前向填充）。合适的缺失值处理能避免分析偏差。"},
              "分组聚合":{"summary":"分组聚合是数据汇总分析的核心操作，类似于SQL的GROUP BY。","detail":"groupby()按指定列分组，后接sum()、mean()、count()、agg()等聚合函数。例如：df.groupby('类别')['销售额'].sum()。分组聚合能快速计算各分类的统计指标。"}
          },
          codeExamples:{
              "Series与DataFrame":"import pandas as pd\ns = pd.Series([10,20,30])\ndf = pd.DataFrame({'产品':['A','B'],'销量':[100,150]})",
              "数据筛选与索引":"df = pd.DataFrame({'姓名':['小李','小王'],'成绩':[88,92]})\nprint(df.loc[0])\nprint(df.iloc[0,1])",
              "缺失值处理":"df = pd.DataFrame({'分数':[85,None,78]})\nprint(df.isna())\ndf_clean = df.dropna()\ndf_filled = df.fillna(df['分数'].mean())",
              "分组聚合":"df = pd.DataFrame({'部门':['销售','技术','销售'],'奖金':[5000,6000,5500]})\nprint(df.groupby('部门').mean())"
          },
          questions:[
              { text:"Pandas中读取CSV文件的函数是？", options:["read_csv()","load_csv()","open_csv()","csv_read()"], correct:0,
                explanation:"pd.read_csv()是Pandas读取CSV文件的标准函数，返回DataFrame对象。" },
              { text:"以下哪个函数用于检测缺失值？", options:["isna()","dropna()","fillna()","notna()"], correct:0,
                explanation:"isna()或isnull()返回布尔型DataFrame，标记缺失值位置。dropna()删除缺失值，fillna()填充缺失值。" },
              { text:"按标签选取DataFrame中的数据应该使用？", options:["iloc","loc","ix","at"], correct:1,
                explanation:"loc是基于标签的索引，iloc是基于整数位置的索引。loc[a,b]表示取索引a行、列名为b的数据。" },
              { text:"groupby()后通常使用什么方法进行聚合计算？", options:["sum()","mean()","agg()","以上都是"], correct:3,
                explanation:"groupby()返回GroupBy对象，可调用sum()、mean()、count()等聚合方法，也可用agg()一次应用多个聚合函数。" },
              { text:"Pandas的常用导入别名是？", options:["pd","pds","pan","panda"], correct:0,
                explanation:"按照社区惯例，使用 import pandas as pd 导入Pandas库。" }
          ]},
        { id:3, icon:"🔍", name:"数据采集与处理", shortDesc:"网络爬虫+数据清洗", tags:["爬虫","数据清洗"], duration:"50分钟", level:"中级",
          overview:"数据采集是从互联网或各种数据源获取信息的过程。本课程将讲解HTTP协议基础、requests库使用、BeautifulSoup解析HTML，以及完整的数据清洗流程。",
          chapters:["HTTP请求基础","BeautifulSoup解析","数据提取技巧","数据清洗实战"],
          content:{
              "HTTP请求基础":{"summary":"HTTP是浏览器与服务器通信的协议，请求库用于模拟浏览器发送请求。","detail":"requests库是最常用的Python HTTP客户端库。GET请求获取数据，POST请求提交数据。需关注状态码（200表示成功）、请求头（User-Agent模拟浏览器）、超时设置等。"},
              "BeautifulSoup解析":{"summary":"BeautifulSoup将HTML文档解析为树形结构，方便提取数据。","detail":"BeautifulSoup支持多种解析器，常用'html.parser'。find()返回第一个匹配元素，find_all()返回所有匹配元素的列表。支持按标签名、属性、文本内容定位。"},
              "数据提取技巧":{"summary":"CSS选择器和正则表达式是精确提取数据的有力工具。","detail":"BeautifulSoup的select()方法支持CSS选择器语法，如'.class'、'#id'、'div a'。正则表达式re模块用于模式匹配，如提取邮箱、电话、数字等特定格式的文本。"},
              "数据清洗实战":{"summary":"原始数据常含有噪音，清洗是保证数据质量的关键步骤。","detail":"清洗步骤包括：去除重复行（drop_duplicates）、处理缺失值（fillna/dropna）、格式统一（str.strip()、astype()）、异常值检测与处理（基于统计方法或业务规则）。"}},
          codeExamples:{
              "HTTP请求基础":"import requests\nr = requests.get('https://api.example.com/data', headers={'User-Agent':'Mozilla/5.0'})\nprint(r.status_code, r.text[:100])",
              "BeautifulSoup解析":"from bs4 import BeautifulSoup\nsoup = BeautifulSoup(html_text, 'html.parser')\ntitle = soup.find('h1').text",
              "数据提取技巧":"links = soup.select('a')\nfor a in links:\n    href = a.get('href')\n    if href and href.startswith('http'):\n        print(href)",
              "数据清洗实战":"df = df.drop_duplicates()\ndf['价格'] = df['价格'].str.replace('¥','').astype(float)\ndf = df.dropna(subset=['价格'])"
          },
          questions:[
              { text:"以下哪个Python库主要用于发送HTTP请求？", options:["BeautifulSoup","requests","scrapy","selenium"], correct:1,
                explanation:"requests是专门用于发送HTTP请求的库，简洁易用。BeautifulSoup解析HTML，scrapy是爬虫框架。" },
              { text:"BeautifulSoup中查找第一个匹配元素的方法是？", options:["find()","find_all()","select()","get()"], correct:0,
                explanation:"find()返回第一个匹配的Tag对象，find_all()返回所有匹配的列表，select()使用CSS选择器。" },
              { text:"以下哪个不属于常见的数据清洗步骤？", options:["去重","缺失值填充","格式转换","模型训练"], correct:3,
                explanation:"模型训练是机器学习建模阶段的工作，不属于数据清洗范畴。清洗聚焦于数据质量提升。" },

    function renderQuiz(course) {
        let qs=quizState[course.id];
        let questions=course.questions;
        let isFinished=qs.answers.every(a=>a!==null);
        let container=document.getElementById('quizArea');
        
        if(!qs.started){
            container.innerHTML = `<div style="padding:1.5rem; text-align:center; color:#8aa88a;"><i class="fas fa-hourglass-half"></i> 点击"开始测试"按钮，限时15分钟完成${questions.length}道选择题，提交后可查看解析~</div>`;
            return;
        }
        
        if(isFinished){
            let correct=qs.answers.filter((a,i)=>a===questions[i].correct).length;
            container.innerHTML=`
                <div class="quiz-result">
                    <div style="font-size:1.2rem; font-weight:700;">🎉 得分：${correct} / ${questions.length} 🎉</div>
                    <div style="margin:0.5rem 0">${correct===questions.length?'💯 完美通关！继续下一门课程吧！':`📚 再复习一下，答对了${correct}道，还需努力~`}</div>
                    <button id="resetQuiz" style="background:#c8bcac; border:none; padding:0.4rem 1rem; border-radius:2rem; margin-top:0.5rem; cursor:pointer;">🔄 重新测试</button>
                </div>`;
            document.getElementById('resetQuiz')?.addEventListener('click',()=>{ stopTimer(course.id); quizState[course.id]={ answers:new Array(questions.length).fill(null), idx:0, time:15*60, timer:null, started:false, showExplanation:false }; renderDetail(course); });
            return;
        }
        
        let q=questions[qs.idx];
        let selected=qs.answers[qs.idx];
        let explanationHtml = '';
        if(qs.showExplanation && selected !== undefined){
            let isCorrect = (selected === q.correct);
            explanationHtml = `
                <div class="explanation-box">
                    <strong>${isCorrect ? '✅ 回答正确！' : '❌ 回答错误'}</strong><br>
                    <strong>📖 解析：</strong> ${q.explanation}<br>
                    ${!isCorrect ? `<span style="color:#c2847a;">💡 正确答案是：${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}</span>` : ''}
                </div>
            `;
        }
        
        container.innerHTML=`
            <div class="question-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;"><span>第 ${qs.idx+1}/${questions.length} 题</span><span style="color:#c2847a;">⭐ 单选题</span></div>
                <div style="margin:0.5rem 0; font-weight:500;">${q.text}</div>
                <div class="options" id="opts">${q.options.map((opt,i)=>`<div class="option ${selected===i?'selected':''}" data-o="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div>
                ${explanationHtml}
                <div class="quiz-actions">
                    <button id="prevQ" ${qs.idx===0?'disabled style="opacity:0.5"':''}>◀ 上一题</button>
                    <button id="checkAnsBtn" style="background:#9ab87a;">🔍 查看解析</button>
                    <button id="nextQ">${qs.idx===questions.length-1?'✅ 提交测验':'下一题 ▶'}</button>
                </div>
            </div>
        `;
        
        document.querySelectorAll('#opts .option').forEach(opt=>{ opt.onclick=()=>{ let val=parseInt(opt.getAttribute('data-o')); qs.answers[qs.idx]=val; renderQuiz(course); }; });
        document.getElementById('prevQ').onclick=()=>{ if(qs.idx>0){ qs.idx--; renderQuiz(course); } };
        document.getElementById('checkAnsBtn').onclick=()=>{ 
            if(qs.answers[qs.idx] !== undefined){ 
                qs.showExplanation = true; 
                renderQuiz(course); 
            } else { 
                alert('请先选择一个答案，再查看解析~'); 
            } 
        };
        document.getElementById('nextQ').onclick=()=>{ 
            if(qs.answers[qs.idx]===null){ alert('请先选择一个答案'); return; }
            if(qs.idx<questions.length-1){ qs.idx++; qs.showExplanation=false; renderQuiz(course); }
            else{ stopTimer(course.id); renderQuiz(course); }
        };
    }
    
    renderHome();
</script>
</body>
</html>
